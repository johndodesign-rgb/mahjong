<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>麻將 Mahjong</title>
<link rel="manifest" href="/mahjong/manifest.json">
<meta name="theme-color" content="#1a120a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mahjong">
<link rel="apple-touch-icon" href="/mahjong/icon-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="/mahjong/icon-192.png">
<link rel="apple-touch-icon" sizes="167x167" href="/mahjong/icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="/mahjong/icon-180.png">
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/mahjong/sw.js");</script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#1a120a; --felt:#0d3320;
  --tile-bg:#F5EDD8; --tile-border:#c8a96e; --tile-shadow:#6b4c1e;
  --red:#C0392B; --gold:#D4A843; --green:#2ecc71;
  --text:#F5EDD8; --dim:rgba(245,237,216,0.5);
}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'DM Mono',monospace;color:var(--text);display:flex;flex-direction:column;height:100dvh;}
.screen{display:none;flex-direction:column;height:100%;width:100%;}
.screen.active{display:flex;}

/* MENU */
#menu{background:var(--bg);align-items:center;justify-content:center;}
#menu::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,rgba(45,106,79,0.25) 0%,transparent 70%);pointer-events:none;}
.menu-ideogram{font-family:'Noto Serif TC',serif;font-size:96px;font-weight:900;color:var(--red);line-height:1;margin-bottom:4px;animation:pulse 3s ease-in-out infinite;position:relative;z-index:1;text-shadow:0 0 60px rgba(192,57,43,0.4),4px 4px 0 rgba(0,0,0,0.5);}
@keyframes pulse{0%,100%{text-shadow:0 0 60px rgba(192,57,43,0.4),4px 4px 0 rgba(0,0,0,0.5);}50%{text-shadow:0 0 90px rgba(192,57,43,0.7),4px 4px 0 rgba(0,0,0,0.5);}}
.menu-title{font-family:'Noto Serif TC',serif;font-size:13px;letter-spacing:0.4em;color:var(--gold);margin-bottom:40px;text-transform:uppercase;position:relative;z-index:1;}
.menu-wrap{position:relative;z-index:1;width:220px;}
.diff-label{font-size:10px;letter-spacing:0.2em;color:var(--dim);text-align:center;margin-bottom:6px;}
.diff-pills{display:flex;gap:6px;justify-content:center;margin-bottom:20px;}
.pill{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.15em;padding:6px 14px;border-radius:20px;border:1px solid rgba(245,237,216,0.2);background:transparent;color:var(--dim);cursor:pointer;transition:all 0.15s;}
.pill.active{background:var(--gold);color:var(--bg);border-color:var(--gold);font-weight:500;}
.menu-btns{display:flex;flex-direction:column;gap:12px;}
.btn{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:0.2em;text-transform:uppercase;padding:14px 20px;border:none;border-radius:3px;cursor:pointer;transition:all 0.15s;width:100%;}
.btn-primary{background:var(--red);color:#fff;} .btn-primary:active{background:#a02a20;transform:scale(0.97);}
.btn-secondary{background:transparent;color:var(--gold);border:1.5px solid var(--gold);} .btn-secondary:active{background:rgba(212,168,67,0.1);}
.btn-ghost{background:transparent;color:var(--dim);border:1px solid rgba(245,237,216,0.15);}

/* GAME */
#game{background:var(--felt);flex-direction:column;overflow:hidden;position:relative;}
#game::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(0,0,0,0.04) 40px,rgba(0,0,0,0.04) 41px),repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(0,0,0,0.04) 40px,rgba(0,0,0,0.04) 41px);pointer-events:none;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,0.4);border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;z-index:10;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.round-badge{font-family:'Noto Serif TC',serif;font-size:18px;color:var(--red);}
.wind-info{font-size:10px;color:var(--dim);letter-spacing:0.1em;}
.score-disp{font-family:'Noto Serif TC',serif;font-size:14px;color:var(--gold);}
.topbar-right{display:flex;gap:8px;}
.icon-btn{background:transparent;border:none;color:var(--dim);font-size:18px;cursor:pointer;padding:4px;line-height:1;}
.ai-area{display:flex;flex-direction:column;gap:4px;padding:6px 8px;flex-shrink:0;}
.ai-row{display:flex;align-items:center;gap:6px;}
.ai-label{font-size:9px;letter-spacing:0.1em;color:var(--dim);width:44px;flex-shrink:0;}
.ai-tiles{display:flex;gap:2px;flex-wrap:nowrap;overflow:hidden;}
.status{padding:4px 12px;font-size:10px;color:var(--gold);letter-spacing:0.1em;text-align:center;min-height:22px;background:rgba(0,0,0,0.2);flex-shrink:0;}
.center-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:6px 8px;min-height:0;}
.discard-pool-label{font-size:9px;color:var(--dim);letter-spacing:0.1em;align-self:flex-start;}
.discard-pool{display:flex;flex-wrap:wrap;gap:3px;justify-content:center;max-height:110px;overflow-y:auto;padding:8px;background:rgba(0,0,0,0.2);border-radius:6px;width:100%;}

/* DISCARD ZONE */
.discard-zone{width:100%;min-height:60px;border:2px dashed rgba(192,57,43,0.4);border-radius:8px;display:flex;align-items:center;justify-content:center;gap:10px;background:rgba(192,57,43,0.05);transition:all 0.18s;flex-shrink:0;}
.discard-zone.hidden{display:none;}
.discard-zone.hot{border-color:var(--red);background:rgba(192,57,43,0.18);box-shadow:0 0 18px rgba(192,57,43,0.3) inset;}
.dz-icon{font-size:24px;opacity:0.4;pointer-events:none;}
.dz-label{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(192,57,43,0.6);pointer-events:none;}

/* PLAYER */
.player-area{flex-shrink:0;background:rgba(0,0,0,0.3);border-top:1px solid rgba(255,255,255,0.08);}
.player-melds{display:flex;gap:3px;padding:4px 8px;min-height:32px;flex-wrap:wrap;align-items:center;}
.player-hand-wrap{padding:4px 4px 4px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.player-hand{display:flex;gap:3px;padding:2px 4px;min-width:max-content;}
.player-actions{display:flex;gap:6px;padding:4px 8px 8px;justify-content:center;flex-wrap:wrap;align-items:center;}

/* TILES */
.tile{width:38px;height:52px;background:var(--tile-bg);border:1.5px solid var(--tile-border);border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:grab;box-shadow:2px 2px 0 var(--tile-shadow);flex-shrink:0;position:relative;user-select:none;-webkit-user-select:none;touch-action:none;gap:2px;}
.tile:active{cursor:grabbing;}
.tile-num{font-family:'Noto Serif TC',serif;font-size:13px;font-weight:900;line-height:1;}
.tile-icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center;}
.tile-icon svg{width:100%;height:100%;}
.tile.face-down{background:#1a5c35;border-color:#145029;cursor:default;}
.tile.face-down .tile-num,.tile.face-down .tile-icon{display:none;}
.tile.face-down::after{content:'';position:absolute;inset:4px;border:1px solid rgba(255,255,255,0.12);border-radius:2px;}
.tile.small{width:25px;height:34px;border-radius:3px;box-shadow:1px 1px 0 var(--tile-shadow);gap:1px;}
.tile.small .tile-num{font-size:9px;} .tile.small .tile-icon{width:13px;height:13px;}
.tile.small.face-down::after{inset:2px;}
.tile.dt{width:27px;height:37px;border-radius:3px;cursor:default;box-shadow:1px 1px 0 var(--tile-shadow);gap:1px;}
.tile.dt .tile-num{font-size:10px;} .tile.dt .tile-icon{width:14px;height:14px;}
.tile.ld{border-color:var(--gold);box-shadow:0 0 8px rgba(212,168,67,0.7),1px 1px 0 var(--tile-shadow);}
.tile.melded{opacity:0.85;}
.tile.dragging{opacity:0.3;}
.tile.ghost-slot{background:rgba(245,237,216,0.12);border:1.5px dashed rgba(212,168,67,0.5);box-shadow:none;}
.tile.reveal{width:72px;height:100px;box-shadow:4px 4px 0 var(--tile-shadow),0 8px 30px rgba(0,0,0,0.5);gap:4px;cursor:pointer;}
.tile.reveal .tile-num{font-size:26px;} .tile.reveal .tile-icon{width:38px;height:38px;}

/* DRAW REVEAL */
#drawReveal{position:fixed;inset:0;background:rgba(0,0,0,0.78);display:none;align-items:center;justify-content:center;flex-direction:column;gap:20px;z-index:200;backdrop-filter:blur(3px);}
#drawReveal.active{display:flex;}
.reveal-label{font-size:11px;letter-spacing:0.3em;text-transform:uppercase;color:var(--dim);}
.reveal-wrap{animation:revealPop 0.35s cubic-bezier(0.34,1.56,0.64,1) both;}
@keyframes revealPop{from{transform:scale(0.4) rotateY(90deg);opacity:0;}to{transform:scale(1) rotateY(0deg);opacity:1;}}
.reveal-hint{font-size:10px;color:var(--dim);letter-spacing:0.1em;}

/* DRAG GHOST */
#dragGhost{position:fixed;pointer-events:none;z-index:999;width:38px;height:52px;background:var(--tile-bg);border:2px solid var(--gold);border-radius:4px;display:none;flex-direction:column;align-items:center;justify-content:center;box-shadow:4px 10px 20px rgba(0,0,0,0.6);gap:2px;transform:rotate(4deg) scale(1.1);}

/* ACTIONS */
.act-btn{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;padding:8px 14px;border:none;border-radius:3px;cursor:pointer;transition:all 0.12s;text-transform:uppercase;}
.act-btn:active{transform:scale(0.95);}
.act-draw{background:var(--green);color:#111;}
.act-claim{background:var(--gold);color:#111;}
.act-pass{background:rgba(255,255,255,0.1);color:var(--dim);}
.act-mahjong{background:var(--red);color:#fff;font-weight:700;animation:glow 1s ease-in-out infinite alternate;}
@keyframes glow{from{box-shadow:0 0 6px rgba(192,57,43,0.4);}to{box-shadow:0 0 20px rgba(192,57,43,1);}}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.82);display:none;align-items:center;justify-content:center;z-index:300;padding:20px;}
.modal-overlay.active{display:flex;}
.modal{background:#0d1f12;border:1px solid rgba(212,168,67,0.3);border-radius:8px;padding:24px;width:100%;max-width:340px;max-height:80vh;overflow-y:auto;}
.modal h2{font-family:'Noto Serif TC',serif;font-size:20px;color:var(--gold);margin-bottom:16px;text-align:center;}
.modal-body{font-size:12px;line-height:1.9;color:var(--dim);margin-bottom:20px;}
.modal-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.06);font-size:12px;}
.modal-row:last-child{border-bottom:none;}
.modal-val{color:var(--gold);font-family:'Noto Serif TC',serif;font-size:14px;}
.modal-btns{display:flex;gap:8px;flex-direction:column;}

/* HINT */
.hint-panel{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.9);border-top:1px solid rgba(212,168,67,0.3);padding:8px 12px;font-size:10px;color:var(--dim);line-height:1.6;z-index:5;display:none;}
.hint-panel.visible{display:block;}
.hint-title{color:var(--gold);font-size:10px;letter-spacing:0.15em;margin-bottom:4px;text-transform:uppercase;}
</style>
</head>
<body>

<div id="dragGhost"></div>

<!-- DRAW REVEAL -->
<div id="drawReveal">
  <div class="reveal-label">You drew</div>
  <div class="reveal-wrap" id="revealWrap"></div>
  <div class="reveal-hint">Tap tile to add to hand</div>
</div>

<!-- MENU -->
<div id="menu" class="screen active">
  <div class="menu-ideogram">麻將</div>
  <div class="menu-title">Classical Mahjong</div>
  <div class="menu-wrap">
    <div class="diff-label">Difficulty</div>
    <div class="diff-pills">
      <button class="pill" onclick="setDiff('easy')">Easy</button>
      <button class="pill active" onclick="setDiff('medium')">Medium</button>
      <button class="pill" onclick="setDiff('hard')">Hard</button>
    </div>
    <div class="menu-btns">
      <button class="btn btn-primary" onclick="startGame(false)">▶ Play Game</button>
      <button class="btn btn-secondary" onclick="startGame(true)">◎ Practice Mode</button>
      <button class="btn btn-ghost" onclick="showRules()">? Rules</button>
    </div>
  </div>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div class="topbar">
    <div class="topbar-left">
      <span class="round-badge" id="roundWind">東</span>
      <div>
        <div class="wind-info" id="seatInfo">Your seat: East</div>
        <div class="wind-info" id="wallCount">Wall: 0</div>
      </div>
    </div>
    <div class="score-disp" id="scoreDisp">0 pts</div>
    <div class="topbar-right">
      <button class="icon-btn" id="hintBtn" onclick="toggleHint()" style="display:none">💡</button>
      <button class="icon-btn" onclick="showMenu()">✕</button>
    </div>
  </div>
  <div class="ai-area" id="aiArea"></div>
  <div class="status" id="status">Starting…</div>
  <div class="center-area">
    <div class="discard-pool-label">DISCARD POOL</div>
    <div class="discard-pool" id="discardPool"></div>
    <div class="discard-zone hidden" id="discardZone">
      <div class="dz-icon">🗑</div>
      <div class="dz-label">Drag tile here to discard</div>
    </div>
  </div>
  <div class="player-area">
    <div class="player-melds" id="playerMelds"></div>
    <div class="player-hand-wrap">
      <div class="player-hand" id="playerHand"></div>
    </div>
    <div class="player-actions" id="playerActions"></div>
  </div>
  <div class="hint-panel" id="hintPanel">
    <div class="hint-title">💡 Practice Hint</div>
    <div id="hintText">Tap Draw Tile to begin.</div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle"></h2>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-btns" id="modalBtns"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// SVG ICONS
// ══════════════════════════════════════════
const SVG={
  B:(c='#1a6b35')=>`<svg viewBox="0 0 18 18" fill="none"><rect x="2.5" y="2" width="3" height="14" rx="1.5" fill="${c}"/><rect x="7.5" y="4" width="3" height="10" rx="1.5" fill="${c}"/><rect x="12.5" y="2" width="3" height="14" rx="1.5" fill="${c}"/><rect x="1.5" y="7.5" width="4.5" height="1.5" rx=".75" fill="${c}" opacity=".45"/><rect x="6.5" y="8.5" width="4.5" height="1.5" rx=".75" fill="${c}" opacity=".45"/><rect x="11.5" y="7.5" width="4.5" height="1.5" rx=".75" fill="${c}" opacity=".45"/></svg>`,
  C:(c='#1a3a8b')=>`<svg viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="7" stroke="${c}" stroke-width="2.2"/><circle cx="9" cy="9" r="3.8" stroke="${c}" stroke-width="1.8"/><circle cx="9" cy="9" r="1.3" fill="${c}"/></svg>`,
  CH:(c='#C0392B')=>`<svg viewBox="0 0 18 18" fill="none"><rect x="2" y="2.5" width="14" height="2" rx="1" fill="${c}"/><rect x="4.5" y="2.5" width="2" height="13" rx="1" fill="${c}"/><rect x="11.5" y="2.5" width="2" height="13" rx="1" fill="${c}"/><rect x="2" y="13.5" width="14" height="2" rx="1" fill="${c}"/><rect x="2" y="7.5" width="14" height="1.5" rx=".75" fill="${c}"/></svg>`,
  WIND:(c='#6a2aab')=>`<svg viewBox="0 0 18 18" fill="none"><polygon points="9,1.5 11,8 9,6.5 7,8" fill="${c}"/><polygon points="9,16.5 11,10 9,11.5 7,10" fill="${c}" opacity=".55"/><polygon points="1.5,9 8,7 6.5,9 8,11" fill="${c}" opacity=".75"/><polygon points="16.5,9 10,7 11.5,9 10,11" fill="${c}" opacity=".4"/><circle cx="9" cy="9" r="2" fill="${c}"/></svg>`,
  DR:(c='#C0392B')=>`<svg viewBox="0 0 18 18" fill="none"><rect x="2" y="3" width="14" height="2" rx="1" fill="${c}"/><rect x="7.5" y="3" width="3" height="12" rx="1.5" fill="${c}"/><rect x="4" y="8" width="10" height="1.8" rx=".9" fill="${c}"/><rect x="2" y="13" width="14" height="2" rx="1" fill="${c}"/></svg>`,
  DG:(c='#1a6b35')=>`<svg viewBox="0 0 18 18" fill="none"><rect x="2" y="3" width="14" height="1.8" rx=".9" fill="${c}"/><rect x="4" y="7" width="10" height="1.8" rx=".9" fill="${c}"/><rect x="4" y="11" width="10" height="1.8" rx=".9" fill="${c}"/><rect x="2" y="14.5" width="14" height="1.8" rx=".9" fill="${c}"/><rect x="7.5" y="3" width="3" height="13" rx="1.5" fill="${c}"/></svg>`,
  DW:(c='#888')=>`<svg viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="14" height="14" rx="2" stroke="${c}" stroke-width="2"/><rect x="5" y="5" width="8" height="8" rx="1" stroke="${c}" stroke-width="1.2"/></svg>`,
  BONUS:()=>`<svg viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="2.5" fill="#D4A843"/><ellipse cx="9" cy="3" rx="2" ry="2.8" fill="#e8c06a" opacity=".9"/><ellipse cx="9" cy="15" rx="2" ry="2.8" fill="#e8c06a" opacity=".9"/><ellipse cx="3" cy="9" rx="2.8" ry="2" fill="#e8c06a" opacity=".9"/><ellipse cx="15" cy="9" rx="2.8" ry="2" fill="#e8c06a" opacity=".9"/><ellipse cx="4.8" cy="4.8" rx="1.6" ry="2.2" transform="rotate(-45 4.8 4.8)" fill="#f0d080" opacity=".7"/><ellipse cx="13.2" cy="4.8" rx="1.6" ry="2.2" transform="rotate(45 13.2 4.8)" fill="#f0d080" opacity=".7"/><ellipse cx="4.8" cy="13.2" rx="1.6" ry="2.2" transform="rotate(45 4.8 13.2)" fill="#f0d080" opacity=".7"/><ellipse cx="13.2" cy="13.2" rx="1.6" ry="2.2" transform="rotate(-45 13.2 13.2)" fill="#f0d080" opacity=".7"/></svg>`,
};

const WL=['東','南','西','北'], WN=['East','South','West','North'], DC=['#C0392B','#1a6b35','#888'];

function getSVG(t){
  if(!t)return'';
  if(t.type==='suit'){if(t.value.suit==='B')return SVG.B();if(t.value.suit==='C')return SVG.C();return SVG.CH();}
  if(t.type==='wind')return SVG.WIND();
  if(t.type==='dragon'){if(t.value===0)return SVG.DR();if(t.value===1)return SVG.DG();return SVG.DW();}
  if(t.type==='bonus')return SVG.BONUS();
  return'';
}
function getNum(t){
  if(!t)return'';
  if(t.type==='suit')return t.value.num;
  if(t.type==='wind')return WL[t.value];
  if(t.type==='dragon')return['中','發','白'][t.value];
  if(t.type==='bonus')return t.value<4?`F${t.value+1}`:`S${t.value-3}`;
  return'?';
}
function getColor(t){
  if(!t)return'#333';
  if(t.type==='suit'){if(t.value.suit==='B')return'#1a6b35';if(t.value.suit==='C')return'#1a3a8b';return'#C0392B';}
  if(t.type==='wind')return'#6a2aab';
  if(t.type==='dragon')return DC[t.value];
  return'#D4A843';
}

// ══════════════════════════════════════════
// DECK
// ══════════════════════════════════════════
function buildDeck(){
  let tiles=[],id=0;
  for(const s of['B','C','CH'])for(let n=1;n<=9;n++)for(let c=0;c<4;c++)tiles.push({type:'suit',value:{suit:s,num:n},id:id++});
  for(let w=0;w<4;w++)for(let c=0;c<4;c++)tiles.push({type:'wind',value:w,id:id++});
  for(let d=0;d<3;d++)for(let c=0;c<4;c++)tiles.push({type:'dragon',value:d,id:id++});
  for(let b=0;b<8;b++)tiles.push({type:'bonus',value:b,id:id++,bonus:true});
  return tiles;
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}
function tKey(t){if(!t)return'';if(t.type==='suit')return`${t.value.suit}${t.value.num}`;if(t.type==='wind')return`W${t.value}`;if(t.type==='dragon')return`D${t.value}`;if(t.type==='bonus')return`X${t.value}`;return'';}
function same(a,b){return tKey(a)===tKey(b);}

// ══════════════════════════════════════════
// WIN / SCORE
// ══════════════════════════════════════════
function canPung(hand,tile){return hand.filter(t=>same(t,tile)).length>=2;}
function canChow(hand,tile){
  if(tile.type!=='suit')return false;
  const{suit,num}=tile.value;
  const ns=hand.filter(t=>t.type==='suit'&&t.value.suit===suit).map(t=>t.value.num);
  for(let s=Math.max(1,num-2);s<=Math.min(7,num);s++){
    if([s,s+1,s+2].filter(n=>n!==num).every(n=>ns.includes(n)))return true;
  }return false;
}
function canWin(hand){return winCheck([...hand].sort((a,b)=>tKey(a).localeCompare(tKey(b))));}
function winCheck(t){
  if(!t.length)return false;
  if(t.length===2)return same(t[0],t[1]);
  if(t.length%3===2)return same(t[0],t[1])&&setsOk(t.slice(2));
  return setsOk(t);
}
function setsOk(t){
  if(!t.length)return true;
  const h=t[0],r=t.slice(1);
  if(r.length>=2&&same(r[0],h)&&same(r[1],h)&&setsOk(r.slice(2)))return true;
  if(h.type==='suit'){
    const{suit,num}=h.value;
    const i1=r.findIndex(x=>x.type==='suit'&&x.value.suit===suit&&x.value.num===num+1);
    if(i1>=0){const r2=[...r];r2.splice(i1,1);const i2=r2.findIndex(x=>x.type==='suit'&&x.value.suit===suit&&x.value.num===num+2);if(i2>=0){const r3=[...r2];r3.splice(i2,1);if(setsOk(r3))return true;}}
  }return false;
}
function score(hand,bonuses,selfDraw,concealed){
  let p=0;if(selfDraw)p+=2;if(concealed)p+=4;
  const g={};for(const t of hand){const k=tKey(t);if(!g[k])g[k]=[];g[k].push(t);}
  for(const ts of Object.values(g)){if(ts.length===3)p+=(ts[0].type==='wind'||ts[0].type==='dragon')?4:2;if(ts.length===4)p+=8;}
  return p+bonuses.length;
}

// ══════════════════════════════════════════
// AI
// ══════════════════════════════════════════
function aiPickDiscard(hand,diff){
  const scored=hand.map(tile=>{
    let s=utility(tile,hand);
    if(diff==='easy')s+=(Math.random()-.5)*5;
    else if(diff==='medium')s+=(Math.random()-.5)*2;
    return{tile,s};
  });
  return scored.sort((a,b)=>a.s-b.s)[0].tile;
}
function utility(tile,hand){
  let s=0;const cnt=hand.filter(t=>same(t,tile)).length;
  if(cnt>=3)return 10;if(cnt===2)s+=4;
  if(tile.type==='suit'){const{suit,num}=tile.value;s+=hand.filter(t=>t.type==='suit'&&t.value.suit===suit&&Math.abs(t.value.num-num)<=2&&t.value.num!==num).length*2;if(num>=3&&num<=7)s+=1;}
  return s;
}
function aiWantsClaim(hand,tile,type,diff){
  const thr=diff==='easy'?.4:diff==='medium'?.65:.82;
  if(type==='pung')return canPung(hand,tile)&&Math.random()<thr;
  if(type==='chow')return canChow(hand,tile)&&Math.random()<thr*.7;
  return false;
}

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let G={};

function newGame(practice,difficulty){
  G={
    wall:shuffle(buildDeck()),
    players:[
      {hand:[],melds:[],bonuses:[],seat:0},
      {hand:[],melds:[],bonuses:[],seat:1},
      {hand:[],melds:[],bonuses:[],seat:2},
      {hand:[],melds:[],bonuses:[],seat:3},
    ],
    discards:[],curP:0,roundWind:0,
    phase:'draw',practice,difficulty,
    pendingTile:null,
    lastDiscard:null,lastBy:-1,
    concealed:[true,true,true,true],
    over:false,claimTimer:null,
    totalScore:0,order:[],
  };
  for(let p=0;p<4;p++)for(let i=0;i<13;i++)dealTo(p);
  G.order=G.players[0].hand.map(t=>t.id);
}

function dealTo(p){
  if(!G.wall.length)return false;
  const t=G.wall.pop();
  if(t.bonus){G.players[p].bonuses.push(t);return dealTo(p);}
  G.players[p].hand.push(t);
  if(p===0)G.order.push(t.id);
  return true;
}

// ══════════════════════════════════════════
// TILE ELEMENT
// ══════════════════════════════════════════
function mkTile(tile,opts={}){
  const el=document.createElement('div');
  const cls=['tile'];
  if(opts.small)cls.push('small');
  if(opts.dt)cls.push('dt');
  if(opts.melded)cls.push('melded');
  if(opts.ld)cls.push('ld');
  if(opts.reveal)cls.push('reveal');
  if(opts.ghost){cls.push('ghost-slot');el.className=cls.join(' ');return el;}
  if(opts.faceDown){cls.push('face-down');el.className=cls.join(' ');return el;}
  el.className=cls.join(' ');
  const n=document.createElement('div');n.className='tile-num';n.textContent=getNum(tile);n.style.color=getColor(tile);
  const ic=document.createElement('div');ic.className='tile-icon';ic.innerHTML=getSVG(tile);
  el.appendChild(n);el.appendChild(ic);
  return el;
}

// ══════════════════════════════════════════
// DRAG STATE — unified pointer (mouse + touch)
// ══════════════════════════════════════════
const D={
  active:false,
  tileId:null,
  insertIdx:-1,
  overZone:false,
};

function orderedHand(){
  if(!G.players||!G.players[0])return[];
  const byId={};for(const t of G.players[0].hand)byId[t.id]=t;
  return G.order.filter(id=>byId[id]).map(id=>byId[id]);
}

// Extract x/y from either mouse or touch event
function evXY(e){
  if(e.touches&&e.touches.length)return{x:e.touches[0].clientX,y:e.touches[0].clientY};
  if(e.changedTouches&&e.changedTouches.length)return{x:e.changedTouches[0].clientX,y:e.changedTouches[0].clientY};
  return{x:e.clientX,y:e.clientY};
}

function bindDrag(el,tile){
  // Touch
  el.addEventListener('touchstart',e=>onDragStart(el,tile,e),{passive:false});
  // Mouse
  el.addEventListener('mousedown',e=>{if(e.button===0)onDragStart(el,tile,e);});
}

function onDragStart(el,tile,e){
  D.active=true;
  D.tileId=tile.id;
  const ordered=orderedHand();
  D.insertIdx=ordered.findIndex(t=>t.id===tile.id);
  D.overZone=false;

  const{x,y}=evXY(e);
  buildGhost(tile,x,y);
  el.classList.add('dragging');
  e.preventDefault();

  // Bind to document so events fire anywhere on screen
  document.addEventListener('touchmove',onDragMove,{passive:false});
  document.addEventListener('touchend',onDragEnd,{passive:false});
  document.addEventListener('touchcancel',onDragCancel,{passive:false});
  document.addEventListener('mousemove',onDragMove);
  document.addEventListener('mouseup',onDragEnd);
}

function onDragMove(e){
  if(!D.active)return;
  const{x,y}=evXY(e);

  // Move ghost
  const gh=document.getElementById('dragGhost');
  gh.style.left=(x-19)+'px';
  gh.style.top=(y-60)+'px';

  // Check discard zone
  const zone=document.getElementById('discardZone');
  if(!zone.classList.contains('hidden')){
    const zr=zone.getBoundingClientRect();
    D.overZone=x>=zr.left&&x<=zr.right&&y>=zr.top&&y<=zr.bottom;
    zone.classList.toggle('hot',D.overZone);
  } else {
    D.overZone=false;
  }

  // Find insert position
  const handDiv=document.getElementById('playerHand');
  const nonDragging=[...handDiv.querySelectorAll('.tile:not(.dragging):not(.ghost-slot)')];
  const ordered=orderedHand();
  const fromIdx=ordered.findIndex(t=>t.id===D.tileId);
  let newInsert=fromIdx;

  if(nonDragging.length>0){
    let placed=false;
    for(let i=0;i<nonDragging.length;i++){
      const r=nonDragging[i].getBoundingClientRect();
      if(x<r.left+r.width/2){
        const targetTile=nonDragging[i].__tileId;
        const targetIdx=ordered.findIndex(t=>t.id===targetTile);
        newInsert=targetIdx===-1?fromIdx:targetIdx;
        placed=true;break;
      }
    }
    if(!placed)newInsert=ordered.length-1;
  }

  if(newInsert!==D.insertIdx){D.insertIdx=newInsert;renderHandWhileDragging();}
  if(e.cancelable)e.preventDefault();
}

function onDragEnd(e){
  if(!D.active)return;
  dragCleanup();

  const zone=document.getElementById('discardZone');
  zone.classList.remove('hot');

  if(D.overZone&&G.phase==='discard'&&G.curP===0){
    const tile=G.players[0].hand.find(t=>t.id===D.tileId);
    D.active=false;D.tileId=null;
    if(tile)doDiscard(tile);
  } else {
    const fromIdx=G.order.indexOf(D.tileId);
    const toIdx=D.insertIdx;
    if(fromIdx!==-1&&toIdx!==-1&&fromIdx!==toIdx){
      G.order.splice(fromIdx,1);
      G.order.splice(toIdx>fromIdx?toIdx-1:toIdx,0,D.tileId);
    }
    D.active=false;D.tileId=null;
    renderPlayerHand();
  }
  if(e.cancelable)e.preventDefault();
}

function onDragCancel(){
  dragCleanup();
  D.active=false;D.tileId=null;
  document.getElementById('discardZone').classList.remove('hot');
  renderPlayerHand();
}

function dragCleanup(){
  document.removeEventListener('touchmove',onDragMove);
  document.removeEventListener('touchend',onDragEnd);
  document.removeEventListener('touchcancel',onDragCancel);
  document.removeEventListener('mousemove',onDragMove);
  document.removeEventListener('mouseup',onDragEnd);
  document.getElementById('dragGhost').style.display='none';
}

function buildGhost(tile,x,y){
  const gh=document.getElementById('dragGhost');
  gh.innerHTML='';
  const n=document.createElement('div');n.className='tile-num';n.textContent=getNum(tile);n.style.color=getColor(tile);
  const ic=document.createElement('div');ic.className='tile-icon';ic.innerHTML=getSVG(tile);
  gh.appendChild(n);gh.appendChild(ic);
  gh.style.display='flex';
  gh.style.left=(x-19)+'px';
  gh.style.top=(y-60)+'px';
}

function renderHandWhileDragging(){
  const handDiv=document.getElementById('playerHand');
  handDiv.innerHTML='';
  const ordered=orderedHand();
  const fromIdx=ordered.findIndex(t=>t.id===D.tileId);
  const toIdx=D.insertIdx;

  // Build display order with ghost slot
  // Strategy: remove dragged tile, insert ghost at toIdx
  const without=ordered.filter((_,i)=>i!==fromIdx);
  const insertAt=Math.max(0,Math.min(toIdx,without.length));
  const display=[];
  for(let i=0;i<without.length;i++){
    if(i===insertAt)display.push({ghost:true});
    display.push({tile:without[i],dragging:false});
  }
  if(insertAt>=without.length)display.push({ghost:true});
  // Also show dragging tile as faded in original slot? No — ghost slot is cleaner.
  // Add the dragged tile as dragging at its position
  display.splice(fromIdx<toIdx?fromIdx:fromIdx+1,0,{tile:ordered[fromIdx],dragging:true});

  for(const item of display){
    if(item.ghost){handDiv.appendChild(mkTile(null,{ghost:true}));continue;}
    const el=mkTile(item.tile,{});
    if(item.dragging)el.classList.add('dragging');
    el.__tileId=item.tile.id;
    if(!item.dragging)bindDrag(el,item.tile);
    handDiv.appendChild(el);
  }
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function renderAll(){renderAI();renderDiscards();renderPlayerHand();renderActions();updateTopBar();if(G.practice)renderHint();}

function renderAI(){
  const area=document.getElementById('aiArea');area.innerHTML='';
  for(let p=1;p<=3;p++){
    const pl=G.players[p];
    const row=document.createElement('div');row.className='ai-row';
    const lbl=document.createElement('div');lbl.className='ai-label';
    lbl.textContent=WL[pl.seat]+(pl.bonuses.length?` +${pl.bonuses.length}🌸`:'');
    row.appendChild(lbl);
    const td=document.createElement('div');td.className='ai-tiles';
    for(const m of pl.melds){for(const t of m.tiles)td.appendChild(mkTile(t,{small:true,melded:true}));const s=document.createElement('div');s.style.width='3px';td.appendChild(s);}
    for(const t of pl.hand)td.appendChild(mkTile(t,{small:true,faceDown:!G.practice}));
    row.appendChild(td);area.appendChild(row);
  }
}

function renderDiscards(){
  const pool=document.getElementById('discardPool');pool.innerHTML='';
  for(let i=0;i<G.discards.length;i++){
    pool.appendChild(mkTile(G.discards[i].tile,{dt:true,ld:i===G.discards.length-1}));
  }
  if(G.discards.length)pool.scrollTop=pool.scrollHeight;
}

function renderPlayerHand(){
  if(D.active){renderHandWhileDragging();return;}
  const handDiv=document.getElementById('playerHand');handDiv.innerHTML='';
  for(const tile of orderedHand()){
    const el=mkTile(tile,{});
    el.__tileId=tile.id;
    bindDrag(el,tile);
    handDiv.appendChild(el);
  }
  // Melds + bonuses
  const md=document.getElementById('playerMelds');md.innerHTML='';
  for(const m of G.players[0].melds){
    for(const t of m.tiles)md.appendChild(mkTile(t,{small:true,melded:true}));
    const sp=document.createElement('span');sp.style.cssText='display:inline-block;width:3px;';md.appendChild(sp);
  }
  if(G.players[0].bonuses.length){
    const bl=document.createElement('span');bl.style.cssText='font-size:10px;color:var(--gold);align-self:center;';
    bl.textContent=G.players[0].bonuses.map(b=>b.value<4?'🌸':'🍂').join('');
    md.appendChild(bl);
  }
}

function renderActions(){
  const acts=document.getElementById('playerActions');acts.innerHTML='';
  if(G.over)return;
  const pl=G.players[0];

  if(G.phase==='claim'&&G.lastDiscard){
    const t=G.lastDiscard;
    const cW=canWin([...pl.hand,t]),cP=canPung(pl.hand,t),cC=G.lastBy===3&&canChow(pl.hand,t);
    if(cW)addBtn(acts,'Mahjong! 🀄','act-mahjong',()=>humanWin(t,false));
    if(cP)addBtn(acts,'Pung','act-claim',()=>humanClaim('pung',t));
    if(cC)addBtn(acts,'Chow','act-claim',()=>humanClaim('chow',t));
    addBtn(acts,'Pass','act-pass',()=>passClaim());
    return;
  }
  if(G.curP===0){
    if(G.phase==='draw'){addBtn(acts,'Draw Tile','act-draw',()=>humanDraw());const h=document.createElement('div');h.style.cssText='font-size:10px;color:var(--dim);text-align:center;';h.textContent='Drag tiles to rearrange';acts.appendChild(h);}
    if(G.phase==='discard'){
      if(canWin(pl.hand))addBtn(acts,'Mahjong! 🀄','act-mahjong',()=>humanWin(null,true));
      const h=document.createElement('div');
      h.style.cssText='font-size:10px;color:var(--dim);text-align:center;';
      h.textContent='Drag any tile into the discard zone ↑';
      acts.appendChild(h);
    }
  }
}

function addBtn(c,label,cls,fn){const b=document.createElement('button');b.className=`act-btn ${cls}`;b.textContent=label;b.onclick=fn;c.appendChild(b);}

function updateTopBar(){
  document.getElementById('roundWind').textContent=WL[G.roundWind];
  document.getElementById('seatInfo').textContent=`Your seat: ${WN[G.players[0].seat]}`;
  document.getElementById('wallCount').textContent=`Wall: ${G.wall.length}`;
  document.getElementById('scoreDisp').textContent=`${G.totalScore} pts`;
}
function setSt(m){document.getElementById('status').textContent=m;}
function showZone(v){document.getElementById('discardZone').classList.toggle('hidden',!v);}

// ══════════════════════════════════════════
// HUMAN ACTIONS
// ══════════════════════════════════════════
function humanDraw(){
  if(G.curP!==0||G.phase!=='draw')return;
  if(!G.wall.length){endDraw();return;}
  // Pop tiles, handle bonus chain
  let t=G.wall.pop();
  while(t&&t.bonus){
    G.players[0].bonuses.push(t);
    updateTopBar();
    if(!G.wall.length){endDraw();return;}
    t=G.wall.pop();
  }
  G.pendingTile=t;
  // Show reveal overlay
  const wrap=document.getElementById('revealWrap');
  wrap.innerHTML='';
  // re-trigger animation
  wrap.style.animation='none';
  wrap.offsetHeight; // reflow
  wrap.style.animation='';
  const el=mkTile(t,{reveal:true});
  el.onclick=acceptDraw;
  wrap.appendChild(el);
  document.getElementById('drawReveal').classList.add('active');
  updateTopBar();
}

function acceptDraw(){
  if(!G.pendingTile)return;
  G.players[0].hand.push(G.pendingTile);
  G.order.push(G.pendingTile.id);
  G.pendingTile=null;
  document.getElementById('drawReveal').classList.remove('active');
  G.phase='discard';
  showZone(true);
  setSt('Drag a tile to discard zone — or tap Mahjong if you can win.');
  renderAll();
  if(canWin(G.players[0].hand))setSt('You can win! Tap Mahjong, or discard.');
}

function doDiscard(tile){
  if(G.curP!==0||G.phase!=='discard')return;
  G.players[0].hand=G.players[0].hand.filter(t=>t.id!==tile.id);
  G.order=G.order.filter(id=>id!==tile.id);
  G.discards.push({tile,by:0});
  G.lastDiscard=tile;G.lastBy=0;
  G.concealed[0]=false;G.phase='claim';
  showZone(false);
  setSt('You discarded. AI considering…');
  renderAll();
  setTimeout(aiClaims,700);
}

function humanClaim(type,tile){
  clearTimeout(G.claimTimer);
  const pl=G.players[0];
  if(type==='pung'){
    const m=pl.hand.filter(t=>same(t,tile)).slice(0,2);
    pl.melds.push({type:'pung',tiles:[tile,...m]});
    pl.hand=pl.hand.filter(t=>!m.find(x=>x.id===t.id));
    for(const x of m)G.order=G.order.filter(id=>id!==x.id);
    G.discards.pop();G.concealed[0]=false;
  } else {
    const{suit,num}=tile.value;
    const st=pl.hand.filter(t=>t.type==='suit'&&t.value.suit===suit);
    let ct=null;
    for(let s=Math.max(1,num-2);s<=Math.min(7,num);s++){
      const need=[s,s+1,s+2].filter(n=>n!==num);
      const found=need.map(n=>st.find(t=>t.value.num===n)).filter(Boolean);
      if(found.length===2){ct=found;break;}
    }
    if(ct){
      pl.melds.push({type:'chow',tiles:[tile,...ct]});
      pl.hand=pl.hand.filter(t=>!ct.find(x=>x.id===t.id));
      for(const x of ct)G.order=G.order.filter(id=>id!==x.id);
      G.discards.pop();G.concealed[0]=false;
    }
  }
  G.curP=0;G.phase='discard';G.lastDiscard=null;
  showZone(true);
  setSt('Claimed! Drag a tile to the discard zone.');
  renderAll();
}

function passClaim(){
  clearTimeout(G.claimTimer);
  G.curP=(G.lastBy+1)%4;
  if(G.curP===0){G.phase='draw';setSt('Your turn — tap Draw Tile.');showZone(false);renderAll();}
  else{G.phase='draw';setSt(`${WN[G.players[G.curP].seat]}'s turn…`);renderAll();setTimeout(()=>aiTurn(G.curP),800);}
}

function humanWin(dt,selfDraw){
  const pl=G.players[0];if(dt)pl.hand.push(dt);
  const pts=score(pl.hand,pl.bonuses,selfDraw,G.concealed[0]);
  G.totalScore+=pts;G.over=true;showZone(false);
  showWinModal(pts,selfDraw);
}

// ══════════════════════════════════════════
// AI
// ══════════════════════════════════════════
function aiClaims(){
  if(!G.lastDiscard)return;
  const t=G.lastDiscard;
  for(let p=1;p<=3;p++){if(canWin([...G.players[p].hand,t])){aiWin(p,t);return;}}
  let claimed=false;
  for(let p=1;p<=3;p++){if(aiWantsClaim(G.players[p].hand,t,'pung',G.difficulty)){aiMeld(p,'pung',t);claimed=true;break;}}
  if(!claimed){
    G.curP=(G.lastBy+1)%4;
    if(G.curP===0){G.phase='draw';setSt('Your turn — tap Draw Tile.');renderAll();}
    else{G.phase='draw';renderAll();setTimeout(()=>aiTurn(G.curP),600);}
  }
}

function aiTurn(p){
  if(G.over)return;G.curP=p;
  const pl=G.players[p];
  if(!dealTo(p)){endDraw();return;}
  setSt(`${WN[pl.seat]} is thinking…`);renderAll();
  if(canWin(pl.hand)){setTimeout(()=>aiWin(p,null),600);return;}
  setTimeout(()=>{
    const d=aiPickDiscard(pl.hand,G.difficulty);
    pl.hand=pl.hand.filter(t=>t.id!==d.id);
    G.discards.push({tile:d,by:p});G.lastDiscard=d;G.lastBy=p;G.phase='claim';
    setSt(`${WN[pl.seat]} discarded — Claim?`);renderAll();
    G.claimTimer=G.practice?null:setTimeout(()=>{if(G.phase==="claim")aiClaims();},G.difficulty==="easy"?6000:G.difficulty==="medium"?4000:2500);
    renderActions();
  },800+Math.random()*400);
}

function aiMeld(p,type,tile){
  const pl=G.players[p];
  if(type==='pung'){
    const m=pl.hand.filter(t=>same(t,tile)).slice(0,2);
    pl.melds.push({type:'pung',tiles:[tile,...m]});
    pl.hand=pl.hand.filter(t=>!m.find(x=>x.id===t.id));
    G.discards.pop();G.concealed[p]=false;
  }
  G.curP=p;G.phase='discard';setSt(`${WN[pl.seat]} claimed a Pung!`);renderAll();
  setTimeout(()=>{
    const d=aiPickDiscard(pl.hand,G.difficulty);
    pl.hand=pl.hand.filter(t=>t.id!==d.id);
    G.discards.push({tile:d,by:p});G.lastDiscard=d;G.lastBy=p;G.phase='claim';
    setSt(`${WN[pl.seat]} discarded — Claim?`);renderAll();
    G.claimTimer=G.practice?null:setTimeout(()=>{if(G.phase==="claim")aiClaims();},G.difficulty==="easy"?6000:G.difficulty==="medium"?4000:2500);
    renderActions();
  },900);
}

function aiWin(p,dt){
  const pl=G.players[p];if(dt)pl.hand.push(dt);
  const self=!dt,pts=score(pl.hand,pl.bonuses,self,G.concealed[p]);
  G.over=true;showZone(false);
  const loss=self?-pts:(G.lastBy===0?-pts:-Math.floor(pts/2));
  G.totalScore+=loss;showLoseModal(p,pts,loss,self);
}

// ══════════════════════════════════════════
// MODALS
// ══════════════════════════════════════════
function endDraw(){
  G.over=true;showZone(false);
  modal('Draw!','<p>The wall ran out — no winner.</p>',[
    {l:'Play Again',c:'btn-primary',f:()=>{hideModal();startGame(G.practice);}},
    {l:'Menu',c:'btn-ghost',f:showMenu},
  ]);
}
function showWinModal(pts,selfDraw){
  let b=`<div class="modal-row"><span>Hand value</span><span class="modal-val">${pts} pts</span></div>`;
  b+=`<div class="modal-row"><span>Win type</span><span class="modal-val">${selfDraw?'Self-draw':'Discard claim'}</span></div>`;
  b+=`<div class="modal-row"><span>Concealed</span><span class="modal-val">${G.concealed[0]?'Yes ✓':'No'}</span></div>`;
  b+=`<div class="modal-row"><span>Total score</span><span class="modal-val" style="color:var(--green)">${G.totalScore} pts</span></div>`;
  modal('麻將! You Win! 🀄',b,[
    {l:'Next Round',c:'btn-primary',f:()=>{hideModal();startGame(G.practice);}},
    {l:'Menu',c:'btn-ghost',f:showMenu},
  ]);
}
function showLoseModal(winner,pts,loss,selfDraw){
  const pl=G.players[winner];
  let b=`<div class="modal-row"><span>${WN[pl.seat]} wins</span><span class="modal-val">${pts} pts</span></div>`;
  b+=`<div class="modal-row"><span>Win type</span><span class="modal-val">${selfDraw?'Self-draw':'Off your discard'}</span></div>`;
  b+=`<div class="modal-row"><span>Your change</span><span class="modal-val" style="color:var(--red)">${loss} pts</span></div>`;
  b+=`<div class="modal-row"><span>Total score</span><span class="modal-val">${G.totalScore} pts</span></div>`;
  modal(`${WN[pl.seat]} Wins!`,b,[
    {l:'Next Round',c:'btn-primary',f:()=>{hideModal();startGame(G.practice);}},
    {l:'Menu',c:'btn-ghost',f:showMenu},
  ]);
}
function modal(title,body,btns){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=body;
  const bc=document.getElementById('modalBtns');bc.innerHTML='';
  for(const b of btns){const el=document.createElement('button');el.className=`btn ${b.c}`;el.textContent=b.l;el.onclick=b.f;bc.appendChild(el);}
  document.getElementById('modalOverlay').classList.add('active');
}
function hideModal(){document.getElementById('modalOverlay').classList.remove('active');}

function showRules(){
  modal('Rules',`
    <p><strong style="color:var(--gold)">Goal:</strong> 4 sets + 1 pair = Mahjong!</p><br>
    <p><strong style="color:var(--gold)">Sets:</strong></p>
    <p>• <strong>Chow</strong> — 3 consecutive, same suit</p>
    <p>• <strong>Pung</strong> — 3 identical tiles</p>
    <p>• <strong>Kong</strong> — 4 identical tiles</p>
    <p>• <strong>Pair</strong> — 2 identical (need exactly 1)</p><br>
    <p><strong style="color:var(--gold)">Suits:</strong> Green stalks = Bamboo · Blue rings = Circle · Red grid = Character</p><br>
    <p><strong style="color:var(--gold)">Claim priority:</strong> Win > Pung > Chow</p><br>
    <p><strong style="color:var(--gold)">Controls:</strong></p>
    <p>• Tap Draw → see your tile → tap to accept</p>
    <p>• Drag tile up into red zone → discard it</p>
    <p>• Drag within hand → reorder tiles</p>
  `,[{l:'Got it',c:'btn-primary',f:hideModal}]);
}

// ══════════════════════════════════════════
// HINTS
// ══════════════════════════════════════════
function renderHint(){
  const pl=G.players[0];let h='';
  if(G.phase==='draw')h='Tap "Draw Tile" to see your tile before it enters your hand.';
  else if(G.phase==='discard'){
    if(canWin(pl.hand))h='🀄 You can win! Tap Mahjong!';
    else{
      const iso=pl.hand.filter(t=>{const o=pl.hand.filter(x=>x.id!==t.id);return!canPung(o,t)&&(t.type!=='suit'||!canChow(o,t));});
      h=iso.length?`Safe to discard: ${iso.slice(0,3).map(tKey).join(', ')}`:'Drag a tile up into the red discard zone.';
    }
  } else if(G.phase==='claim'&&G.lastDiscard){
    const t=G.lastDiscard,hs=[];
    if(canWin([...pl.hand,t]))hs.push('You can WIN!');
    if(canPung(pl.hand,t))hs.push('Pung available');
    if(canChow(pl.hand,t))hs.push('Chow available');
    h=hs.length?hs.join(' · '):"Pass — tile doesn't help.";
  }
  document.getElementById('hintText').textContent=h;
}
function toggleHint(){document.getElementById('hintPanel').classList.toggle('visible');}

// ══════════════════════════════════════════
// NAV
// ══════════════════════════════════════════
let currentDiff='medium';
function setDiff(d){
  currentDiff=d;
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  document.querySelector(`.pill[onclick="setDiff('${d}')"]`).classList.add('active');
}

function startGame(practice){
  hideModal();
  newGame(practice,currentDiff);
  document.getElementById('menu').classList.remove('active');
  document.getElementById('game').classList.add('active');
  document.getElementById('hintBtn').style.display=practice?'block':'none';
  if(practice)document.getElementById('hintPanel').classList.add('visible');
  else document.getElementById('hintPanel').classList.remove('visible');
  showZone(false);
  G.phase='draw';G.curP=0;
  setSt('Your turn — tap Draw Tile.');
  renderAll();
}

function showMenu(){
  clearTimeout(G.claimTimer);
  // clean up any active drag
  dragCleanup();D.active=false;D.tileId=null;
  document.getElementById('drawReveal').classList.remove('active');
  document.getElementById('discardZone').classList.remove('hot');
  document.getElementById('game').classList.remove('active');
  document.getElementById('menu').classList.add('active');
  hideModal();
}
</script>
