<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>麻將 Mahjong</title>
<link rel="manifest" href="/mahjong/manifest.json">
<meta name="theme-color" content="#1a120a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mahjong">
<link rel="apple-touch-icon" href="/mahjong/icon-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="/mahjong/icon-192.png">
<link rel="apple-touch-icon" sizes="167x167" href="/mahjong/icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="/mahjong/icon-180.png">
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/mahjong/sw.js");</script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#1a120a; --felt:#0d3320;
  --tile-bg:#F5EDD8; --tile-border:#c8a96e; --tile-shadow:#6b4c1e;
  --red:#C0392B; --gold:#D4A843; --green:#2ecc71;
  --text:#F5EDD8; --dim:rgba(245,237,216,0.5);
}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'DM Mono',monospace;color:var(--text);display:flex;flex-direction:column;height:100dvh;}
.screen{display:none;flex-direction:column;height:100%;width:100%;}
.screen.active{display:flex;}

/* MENU */
#menu{background:var(--bg);align-items:center;justify-content:center;}
#menu::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,rgba(45,106,79,0.25) 0%,transparent 70%);pointer-events:none;}
.menu-ideogram{font-family:'Noto Serif TC',serif;font-size:96px;font-weight:900;color:var(--red);line-height:1;margin-bottom:4px;animation:pulse 3s ease-in-out infinite;position:relative;z-index:1;text-shadow:0 0 60px rgba(192,57,43,0.4),4px 4px 0 rgba(0,0,0,0.5);}
@keyframes pulse{0%,100%{text-shadow:0 0 60px rgba(192,57,43,0.4),4px 4px 0 rgba(0,0,0,0.5);}50%{text-shadow:0 0 90px rgba(192,57,43,0.7),4px 4px 0 rgba(0,0,0,0.5);}}
.menu-title{font-family:'Noto Serif TC',serif;font-size:13px;letter-spacing:0.4em;color:var(--gold);margin-bottom:40px;text-transform:uppercase;position:relative;z-index:1;}
.menu-wrap{position:relative;z-index:1;width:220px;}
.diff-label{font-size:10px;letter-spacing:0.2em;color:var(--dim);text-align:center;margin-bottom:6px;}
.diff-pills{display:flex;gap:6px;justify-content:center;margin-bottom:20px;}
.pill{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.15em;padding:6px 14px;border-radius:20px;border:1px solid rgba(245,237,216,0.2);background:transparent;color:var(--dim);cursor:pointer;transition:all 0.15s;}
.pill.active{background:var(--gold);color:var(--bg);border-color:var(--gold);font-weight:500;}
.menu-btns{display:flex;flex-direction:column;gap:12px;}
.btn{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:0.2em;text-transform:uppercase;padding:14px 20px;border:none;border-radius:3px;cursor:pointer;transition:all 0.15s;width:100%;}
.btn-primary{background:var(--red);color:#fff;} .btn-primary:active{background:#a02a20;transform:scale(0.97);}
.btn-secondary{background:transparent;color:var(--gold);border:1.5px solid var(--gold);} .btn-secondary:active{background:rgba(212,168,67,0.1);}
.btn-ghost{background:transparent;color:var(--dim);border:1px solid rgba(245,237,216,0.15);}

/* GAME */
#game{background:var(--felt);flex-direction:column;overflow:hidden;position:relative;}
#game::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(0,0,0,0.04) 40px,rgba(0,0,0,0.04) 41px),repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(0,0,0,0.04) 40px,rgba(0,0,0,0.04) 41px);pointer-events:none;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,0.45);border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;z-index:10;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.round-badge{font-family:'Noto Serif TC',serif;font-size:18px;color:var(--red);}
.wind-info{font-size:10px;color:var(--dim);letter-spacing:0.1em;}
.score-disp{font-family:'Noto Serif TC',serif;font-size:14px;color:var(--gold);}
.topbar-right{display:flex;gap:8px;}
.icon-btn{background:transparent;border:none;color:var(--dim);font-size:18px;cursor:pointer;padding:4px;line-height:1;}

/* AI — compact scoreboard strip, no tile display in non-practice mode */
.ai-area{display:flex;gap:0;flex-shrink:0;background:rgba(0,0,0,0.35);border-bottom:1px solid rgba(255,255,255,0.06);}
.ai-row{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:5px 4px;border-right:1px solid rgba(255,255,255,0.05);}
.ai-row:last-child{border-right:none;}
.ai-label{font-size:10px;letter-spacing:0.05em;color:var(--dim);text-align:center;margin-bottom:2px;}
.ai-count{font-family:'Noto Serif TC',serif;font-size:13px;color:var(--text);opacity:0.8;}
.ai-melds{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;margin-top:2px;}
/* In practice mode tiles show — same strip but tiles visible */
.ai-tiles{display:flex;gap:1px;flex-wrap:wrap;justify-content:center;max-width:100%;margin-top:2px;}

.status{padding:5px 12px;font-size:11px;color:var(--gold);letter-spacing:0.08em;text-align:center;min-height:24px;background:rgba(0,0,0,0.3);border-bottom:1px solid rgba(255,255,255,0.04);flex-shrink:0;}

/* CENTER — fills all available space */
.center-area{flex:1;display:flex;flex-direction:column;align-items:stretch;gap:0;padding:0;min-height:0;}
.discard-pool-label{font-size:9px;color:var(--dim);letter-spacing:0.1em;padding:6px 10px 2px;opacity:0.5;}
.discard-pool{flex:1;display:flex;flex-wrap:wrap;gap:5px;justify-content:center;align-content:flex-start;overflow-y:auto;padding:8px 10px;min-height:0;}

/* DISCARD ZONE */
.discard-zone{width:100%;min-height:56px;border-top:2px dashed rgba(192,57,43,0.35);border-bottom:2px dashed rgba(192,57,43,0.35);display:flex;align-items:center;justify-content:center;gap:10px;background:rgba(192,57,43,0.04);transition:all 0.18s;flex-shrink:0;}
.discard-zone.hidden{display:none;}
.discard-zone.hot{border-color:var(--red);background:rgba(192,57,43,0.15);box-shadow:0 0 20px rgba(192,57,43,0.25) inset;}
.dz-icon{font-size:20px;opacity:0.35;pointer-events:none;}
.dz-label{font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(192,57,43,0.6);pointer-events:none;}

/* PLAYER */
.player-area{flex-shrink:0;background:rgba(0,0,0,0.4);border-top:1px solid rgba(255,255,255,0.1);}
.player-melds{display:flex;gap:3px;padding:5px 10px;min-height:28px;flex-wrap:wrap;align-items:center;border-bottom:1px solid rgba(255,255,255,0.05);}
.player-hand-wrap{padding:8px 6px 6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;display:flex;justify-content:center;}
.player-hand-wrap::-webkit-scrollbar{display:none;}
.player-hand{display:flex;gap:5px;padding:2px 6px;min-width:max-content;}

/* Actions on the felt */
.player-actions{display:flex;gap:8px;padding:8px 12px;justify-content:center;flex-wrap:wrap;align-items:center;background:transparent;}

/* TILES — bigger player tiles */
.tile{width:44px;height:60px;background:var(--tile-bg);border:1.5px solid var(--tile-border);border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:grab;box-shadow:2px 3px 0 var(--tile-shadow);flex-shrink:0;position:relative;user-select:none;-webkit-user-select:none;touch-action:none;gap:3px;}
.tile:active{cursor:grabbing;}
.tile-num{font-family:'Noto Serif TC',serif;font-size:15px;font-weight:900;line-height:1;}
.tile-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
.tile-icon svg{width:100%;height:100%;}
.tile.face-down{background:#1a5c35;border-color:#145029;cursor:default;}
.tile.face-down .tile-num,.tile.face-down .tile-icon{display:none;}
.tile.face-down::after{content:'';position:absolute;inset:4px;border:1px solid rgba(255,255,255,0.12);border-radius:2px;}
.tile.small{width:22px;height:30px;border-radius:3px;box-shadow:1px 1px 0 var(--tile-shadow);gap:1px;}
.tile.small .tile-num{font-size:8px;} .tile.small .tile-icon{width:11px;height:11px;}
.tile.small.face-down::after{inset:2px;}
.tile.dt{width:36px;height:50px;border-radius:4px;cursor:default;box-shadow:1px 2px 0 var(--tile-shadow);gap:2px;}
.tile.dt .tile-num{font-size:13px;} .tile.dt .tile-icon{width:18px;height:18px;}
.tile.ld{border-color:var(--gold);box-shadow:0 0 8px rgba(212,168,67,0.7),1px 2px 0 var(--tile-shadow);}
.tile.melded{opacity:0.85;}
.tile.dragging{opacity:0.3;}
.tile.ghost-slot{width:44px;height:60px;background:rgba(245,237,216,0.12);border:1.5px dashed rgba(212,168,67,0.5);box-shadow:none;border-radius:5px;}
.tile.reveal{width:80px;height:112px;box-shadow:4px 4px 0 var(--tile-shadow),0 8px 30px rgba(0,0,0,0.5);gap:5px;cursor:pointer;border-radius:8px;}
.tile.reveal .tile-num{font-size:30px;} .tile.reveal .tile-icon{width:44px;height:44px;}

/* HINT — always in flow, never clipped */
.hint-panel{background:rgba(0,0,0,0.92);border-top:1px solid rgba(212,168,67,0.3);padding:10px 14px;font-size:13px;color:var(--text);line-height:1.6;display:none;flex-shrink:0;}
.hint-panel.visible{display:block;}
.hint-title{color:var(--gold);font-size:12px;letter-spacing:0.15em;text-transform:uppercase;}
.hint-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.hint-close{background:transparent;border:none;color:var(--text);font-size:24px;cursor:pointer;padding:0 2px;line-height:1;}

/* DRAW REVEAL */
#drawReveal{position:fixed;inset:0;background:rgba(0,0,0,0.78);display:none;align-items:center;justify-content:center;flex-direction:column;gap:20px;z-index:200;backdrop-filter:blur(3px);}
#drawReveal.active{display:flex;}
.reveal-label{font-size:11px;letter-spacing:0.3em;text-transform:uppercase;color:var(--dim);}
.reveal-wrap{animation:revealPop 0.35s cubic-bezier(0.34,1.56,0.64,1) both;}
@keyframes revealPop{from{transform:scale(0.4) rotateY(90deg);opacity:0;}to{transform:scale(1) rotateY(0deg);opacity:1;}}
.reveal-hint{font-size:10px;color:var(--dim);letter-spacing:0.1em;}

/* DRAG GHOST */
#dragGhost{position:fixed;pointer-events:none;z-index:999;width:44px;height:60px;background:var(--tile-bg);border:2px solid var(--gold);border-radius:5px;display:none;flex-direction:column;align-items:center;justify-content:center;box-shadow:4px 10px 20px rgba(0,0,0,0.6);gap:3px;transform:rotate(4deg) scale(1.1);}

/* ACTIONS */
.act-btn{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;padding:8px 14px;border:none;border-radius:3px;cursor:pointer;transition:all 0.12s;text-transform:uppercase;}
.act-btn:active{transform:scale(0.95);}
.act-draw{background:var(--green);color:#111;}
.act-claim{background:var(--gold);color:#111;}
.act-pass{background:rgba(255,255,255,0.1);color:var(--dim);}
.act-mahjong{background:var(--red);color:#fff;font-weight:700;animation:glow 1s ease-in-out infinite alternate;}
@keyframes glow{from{box-shadow:0 0 6px rgba(192,57,43,0.4);}to{box-shadow:0 0 20px rgba(192,57,43,1);}}
/* RESULT PANEL — slides up over center, table stays visible */
#resultPanel{
  position:absolute;
  left:0;right:0;bottom:0;
  background:linear-gradient(to top, rgba(6,20,10,0.98) 0%, rgba(10,30,16,0.96) 100%);
  border-top:2px solid rgba(212,168,67,0.4);
  border-radius:16px 16px 0 0;
  padding:20px 24px 28px;
  z-index:50;
  transform:translateY(100%);
  transition:transform 0.4s cubic-bezier(0.22,1,0.36,1);
  pointer-events:none;
}
#resultPanel.visible{
  transform:translateY(0);
  pointer-events:all;
}
.result-handle{
  width:40px;height:4px;
  background:rgba(212,168,67,0.3);
  border-radius:2px;
  margin:0 auto 16px;
}
.result-title{
  font-family:'Noto Serif TC',serif;
  font-size:24px;font-weight:900;
  color:var(--gold);
  text-align:center;
  margin-bottom:16px;
  letter-spacing:0.05em;
}
.result-title.win{color:var(--gold);}
.result-title.lose{color:rgba(192,57,43,0.9);}
.result-title.draw{color:var(--dim);}
.result-rows{margin-bottom:20px;}
.result-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.07);
  font-size:15px;color:var(--dim);
}
.result-row:last-child{border-bottom:none;}
.result-val{
  font-family:'Noto Serif TC',serif;
  font-size:18px;color:var(--gold);
}
.result-val.positive{color:var(--green);}
.result-val.negative{color:var(--red);}
.result-btns{display:flex;gap:10px;flex-direction:column;}

/* HARD MODE — tile claim animation */
@keyframes slideIntoHand{
  0%{transform:translateY(-180px) scale(1.15);opacity:1;}
  60%{transform:translateY(20px) scale(0.95);opacity:1;}
  100%{transform:translateY(0) scale(1);opacity:1;}
}
.tile.claiming{animation:slideIntoHand 0.45s cubic-bezier(0.22,1,0.36,1) forwards;}

/* Hard mode discard tile — clickable glow */
.tile.dt.claimable{
  cursor:pointer;
  border-color:var(--gold);
  box-shadow:0 0 12px rgba(212,168,67,0.8),1px 1px 0 var(--tile-shadow);
  animation:claimPulse 0.8s ease-in-out infinite alternate;
}
@keyframes claimPulse{
  from{box-shadow:0 0 8px rgba(212,168,67,0.6),1px 1px 0 var(--tile-shadow);}
  to{box-shadow:0 0 18px rgba(212,168,67,1),0 0 30px rgba(212,168,67,0.4),1px 1px 0 var(--tile-shadow);}
}

/* Meld confirm area */
.meld-confirm{
  display:flex;flex-direction:column;align-items:center;gap:10px;
  padding:12px 16px;
  background:rgba(0,0,0,0.4);
  border-top:1px solid rgba(212,168,67,0.2);
  flex-shrink:0;
}
.meld-confirm-label{font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);opacity:0.8;}
.meld-confirm-tiles{display:flex;gap:6px;align-items:center;justify-content:center;}
.meld-confirm-actions{display:flex;gap:8px;}
.meld-sep{font-size:18px;color:var(--dim);margin:0 4px;}


/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.82);display:none;align-items:center;justify-content:center;z-index:300;padding:0;}
.modal-overlay.active{display:flex;}
.modal{background:#0d1f12;border:none;border-radius:0;padding:0;width:100%;height:100%;max-width:100%;max-height:100%;overflow-y:auto;display:flex;flex-direction:column;}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid rgba(212,168,67,0.2);flex-shrink:0;}
.modal h2{font-family:'Noto Serif TC',serif;font-size:26px;color:var(--gold);margin:0;}
.modal-close{background:transparent;border:none;color:var(--text);font-size:30px;cursor:pointer;padding:0 4px;line-height:1;opacity:0.8;}
.modal-body{font-size:17px;line-height:2.1;color:var(--text);padding:24px;flex:1;}
.modal-body p{margin-bottom:8px;} .modal-body strong{color:var(--gold);}
.modal-body br{display:block;margin-bottom:8px;content:'';}
.modal-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.06);font-size:16px;}
.modal-row:last-child{border-bottom:none;}
.modal-val{color:var(--gold);font-family:'Noto Serif TC',serif;font-size:18px;}
.modal-btns{display:flex;gap:8px;flex-direction:column;padding:20px 24px;border-top:1px solid rgba(212,168,67,0.15);flex-shrink:0;}

/* HINT */
.hint-panel{position:relative;background:rgba(0,0,0,0.92);border-top:1px solid rgba(212,168,67,0.3);padding:12px 16px;font-size:14px;color:var(--text);line-height:1.8;z-index:5;display:none;flex-shrink:0;}
.hint-panel.visible{display:block;}
.hint-title{color:var(--gold);font-size:13px;letter-spacing:0.15em;text-transform:uppercase;}
</style>
</head>
<body>

<div id="dragGhost"></div>

<!-- DRAW REVEAL -->
<div id="drawReveal">
  <div class="reveal-label">You drew</div>
  <div class="reveal-wrap" id="revealWrap"></div>
  <div class="reveal-hint">Tap tile to add to hand</div>
</div>

<!-- MENU -->
<div id="menu" class="screen active">
  <div class="menu-ideogram">麻將</div>
  <div class="menu-title">Classical Mahjong</div>
  <div class="menu-wrap">
    <div class="diff-label">Difficulty</div>
    <div class="diff-pills">
      <button class="pill" onclick="setDiff('easy')">Easy</button>
      <button class="pill active" onclick="setDiff('medium')">Medium</button>
      <button class="pill" onclick="setDiff('hard')">Hard</button>
    </div>
    <div class="menu-btns">
      <button class="btn btn-primary" onclick="startGame(false)">▶ Play Game</button>
      <button class="btn btn-secondary" onclick="startGame(true)">◎ Practice Mode</button>
      <button class="btn btn-ghost" onclick="showRules()">? Rules</button>
    </div>
  </div>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div class="topbar">
    <div class="topbar-left">
      <span class="round-badge" id="roundWind">東</span>
      <div>
        <div class="wind-info" id="seatInfo">Your seat: East</div>
        <div class="wind-info" id="wallCount">Wall: 0</div>
      </div>
    </div>
    <div class="score-disp" id="scoreDisp">0 pts</div>
    <div class="topbar-right">
      <button class="icon-btn" id="hintBtn" onclick="toggleHint()" style="display:none">💡</button>
      <button class="icon-btn" onclick="showMenu()">✕</button>
    </div>
  </div>
  <div class="ai-area" id="aiArea"></div>
  <div class="status" id="status">Starting…</div>
  <div class="center-area">
    <div class="discard-pool-label">DISCARD POOL</div>
    <div class="discard-pool" id="discardPool"></div>
  </div>
  <div class="discard-zone hidden" id="discardZone">
    <div class="dz-icon">🗑</div>
    <div class="dz-label">Drag tile here to discard</div>
  </div>
  <div class="player-actions" id="playerActions"></div>
  <div class="player-area">
    <div class="player-melds" id="playerMelds"></div>
    <div class="player-hand-wrap">
      <div class="player-hand" id="playerHand"></div>
    </div>
    <div class="hint-panel" id="hintPanel">
      <div class="hint-header">
        <div class="hint-title">💡 Practice Hint</div>
        <button class="hint-close" onclick="toggleHint()">✕</button>
      </div>
      <div id="hintText">Tap Draw Tile to begin.</div>
    </div>
  </div>
  <!-- RESULT PANEL — slides up over table -->
  <div id="resultPanel">
    <div class="result-handle"></div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-rows" id="resultRows"></div>
    <div class="result-btns" id="resultBtns"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle"></h2>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-btns" id="modalBtns"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// SVG ICONS
// ══════════════════════════════════════════
const SVG={
  B:(c='#1a6b35')=>`<svg viewBox="0 0 18 18" fill="none"><rect x="2.5" y="2" width="3" height="14" rx="1.5" fill="${c}"/><rect x="7.5" y="4" width="3" height="10" rx="1.5" fill="${c}"/><rect x="12.5" y="2" width="3" height="14" rx="1.5" fill="${c}"/><rect x="1.5" y="7.5" width="4.5" height="1.5" rx=".75" fill="${c}" opacity=".45"/><rect x="6.5" y="8.5" width="4.5" height="1.5" rx=".75" fill="${c}" opacity=".45"/><rect x="11.5" y="7.5" width="4.5" height="1.5" rx=".75" fill="${c}" opacity=".45"/></svg>`,
  C:(c='#1a3a8b')=>`<svg viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="7" stroke="${c}" stroke-width="2.2"/><circle cx="9" cy="9" r="3.8" stroke="${c}" stroke-width="1.8"/><circle cx="9" cy="9" r="1.3" fill="${c}"/></svg>`,

const WL=['東','南','西','北'], WN=['East','South','West','North'], DC=['#C0392B','#1a6b35','#888'];

function getSVG(t){
  if(!t)return'';
  if(t.type==='suit'){if(t.value.suit==='B')return SVG.B();if(t.value.suit==='C')return SVG.C();return SVG.CH();}
  if(t.type==='wind')return SVG.WIND();
  if(t.type==='dragon'){if(t.value===0)return SVG.DR();if(t.value===1)return SVG.DG();return SVG.DW();}
  if(t.type==='bonus')return SVG.BONUS();
  return'';
}
function getNum(t){
  if(!t)return'';
  if(t.type==='suit')return t.value.num;
  if(t.type==='wind')return WL[t.value];
  if(t.type==='dragon')return['中','發','白'][t.value];
  if(t.type==='bonus')return t.value<4?`F${t.value+1}`:`S${t.value-3}`;
  return'?';
}
function getColor(t){
  if(!t)return'#333';
  if(t.type==='suit'){if(t.value.suit==='B')return'#1a6b35';if(t.value.suit==='C')return'#1a3a8b';return'#C0392B';}
  if(t.type==='wind')return'#6a2aab';
  if(t.type==='dragon')return DC[t.value];
  return'#D4A843';
}

// ══════════════════════════════════════════
// DECK
// ══════════════════════════════════════════
function buildDeck(){
  let tiles=[],id=0;
  for(const s of['B','C','CH'])for(let n=1;n<=9;n++)for(let c=0;c<4;c++)tiles.push({type:'suit',value:{suit:s,num:n},id:id++});
  for(let w=0;w<4;w++)for(let c=0;c<4;c++)tiles.push({type:'wind',value:w,id:id++});
  for(let d=0;d<3;d++)for(let c=0;c<4;c++)tiles.push({type:'dragon',value:d,id:id++});
  for(let b=0;b<8;b++)tiles.push({type:'bonus',value:b,id:id++,bonus:true});
  return tiles;
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}
function tKey(t){if(!t)return'';if(t.type==='suit')return`${t.value.suit}${t.value.num}`;if(t.type==='wind')return`W${t.value}`;if(t.type==='dragon')return`D${t.value}`;if(t.type==='bonus')return`X${t.value}`;return'';}
function same(a,b){return tKey(a)===tKey(b);}

// ══════════════════════════════════════════
// WIN / SCORE
// ══════════════════════════════════════════
function canPung(hand,tile){return hand.filter(t=>same(t,tile)).length>=2;}
function canChow(hand,tile){
  if(tile.type!=='suit')return false;
  const{suit,num}=tile.value;
  const ns=hand.filter(t=>t.type==='suit'&&t.value.suit===suit).map(t=>t.value.num);
  for(let s=Math.max(1,num-2);s<=Math.min(7,num);s++){
    if([s,s+1,s+2].filter(n=>n!==num).every(n=>ns.includes(n)))return true;
  }return false;
}
function canWin(hand){return winCheck([...hand].sort((a,b)=>tKey(a).localeCompare(tKey(b))));}
function winCheck(t){
  if(!t.length)return false;
  if(t.length===2)return same(t[0],t[1]);
  if(t.length%3===2)return same(t[0],t[1])&&setsOk(t.slice(2));
  return setsOk(t);
}
function setsOk(t){
  if(!t.length)return true;
  const h=t[0],r=t.slice(1);
  if(r.length>=2&&same(r[0],h)&&same(r[1],h)&&setsOk(r.slice(2)))return true;
  if(h.type==='suit'){
    const{suit,num}=h.value;
    const i1=r.findIndex(x=>x.type==='suit'&&x.value.suit===suit&&x.value.num===num+1);
    if(i1>=0){const r2=[...r];r2.splice(i1,1);const i2=r2.findIndex(x=>x.type==='suit'&&x.value.suit===suit&&x.value.num===num+2);if(i2>=0){const r3=[...r2];r3.splice(i2,1);if(setsOk(r3))return true;}}
  }return false;
}
function score(hand,bonuses,selfDraw,concealed){
  let p=0;if(selfDraw)p+=2;if(concealed)p+=4;
  const g={};for(const t of hand){const k=tKey(t);if(!g[k])g[k]=[];g[k].push(t);}
  for(const ts of Object.values(g)){if(ts.length===3)p+=(ts[0].type==='wind'||ts[0].type==='dragon')?4:2;if(ts.length===4)p+=8;}
  return p+bonuses.length;
}

// ══════════════════════════════════════════
// DISCARD TRACKING
// ══════════════════════════════════════════

// Returns count of how many of a tile key have been discarded
function discardedCount(key){
  return G.discards.filter(d=>tKey(d.tile)===key).length;
}

// Is this tile "dead" — too many discarded to complete a set?
function tileIsDead(tile){
  return discardedCount(tKey(tile))>=3;
}

// How many of this tile key are still live (not discarded)
function liveTilesRemaining(key){
  return 4 - discardedCount(key);
}

// Is a chow still achievable given discards?
function chowIsLive(suit,nums){
  return nums.every(n=>{
    const key=`${suit}${n}`;
    return liveTilesRemaining(key)>0;
  });
}

// ══════════════════════════════════════════
// SHANTEN CALCULATOR
// ══════════════════════════════════════════
// Returns how many tiles away from winning (-1 = already winning)
// Uses standard shanten formula for regular hands

function shanten(hand){
  const tiles=[...hand].sort((a,b)=>tKey(a).localeCompare(tKey(b)));
  return shantenRecursive(tiles,false);
}

function shantenRecursive(tiles,hasPair){
  // Base: empty hand
  if(tiles.length===0) return hasPair ? -1 : 0; // -1=win, 0=need pair

  let best=8; // worst case

  // Try using first tile as part of pair
  if(!hasPair){
    const pairIdx=tiles.findIndex((t,i)=>i>0&&same(t,tiles[i-1]));
    if(pairIdx>=0){
      const rest=tiles.filter((_,i)=>i!==pairIdx&&i!==pairIdx-1);
      const s=shantenRecursive(rest,true);
      best=Math.min(best,s);
    }
    // No pair found yet — count as needing one more
    best=Math.min(best,shantenSets(tiles)+1);
  } else {
    best=Math.min(best,shantenSets(tiles));
  }
  return best;
}

function shantenSets(tiles){
  if(tiles.length===0)return -1;
  const t=tiles[0],rest=tiles.slice(1);
  let best=tiles.length; // worst: each tile isolated = length/3 sets needed *2 shanten each

  // Try pung
  const p1=rest.findIndex(x=>same(x,t));
  if(p1>=0){
    const r2=[...rest];r2.splice(p1,1);
    const p2=r2.findIndex(x=>same(x,t));
    if(p2>=0){r2.splice(p2,1);best=Math.min(best,shantenSets(r2));}
    // Partial pung (pair used as set start) — 1 away
    best=Math.min(best,1+shantenSets(r2.filter((_,i)=>i!==p1)));
  }

  // Try chow
  if(t.type==='suit'){
    const{suit,num}=t.value;
    const i1=rest.findIndex(x=>x.type==='suit'&&x.value.suit===suit&&x.value.num===num+1);
    if(i1>=0){
      const r2=[...rest];r2.splice(i1,1);
      const i2=r2.findIndex(x=>x.type==='suit'&&x.value.suit===suit&&x.value.num===num+2);
      if(i2>=0){r2.splice(i2,1);best=Math.min(best,shantenSets(r2));}
      // Partial chow (2-sided wait) — 1 away
      best=Math.min(best,1+shantenSets(r2));
    }
    // Kanchan (middle wait: num, num+2)
    const i3=rest.findIndex(x=>x.type==='suit'&&x.value.suit===suit&&x.value.num===num+2);
    if(i3>=0){const r2=[...rest];r2.splice(i3,1);best=Math.min(best,1+shantenSets(r2));}
  }

  // Skip tile (isolated — costs 2 shanten to make a set from nothing)
  best=Math.min(best,2+shantenSets(rest));

  return best;
}


// ══════════════════════════════════════════
// HARD MODE — TILE CLICK CLAIM
// ══════════════════════════════════════════
function hardModeTileClaim(tile){
  clearTimeout(G.claimTimer);
  const pl=G.players[0];

  // Determine what claim is available, priority: Win > Pung > Chow
  const cW=canWin([...pl.hand,tile]);
  const cP=canPung(pl.hand,tile);
  const cC=G.lastBy===3&&canChow(pl.hand,tile);

  if(cW){
    // Animate tile sliding in then declare win
    animateTileClaim(tile,()=>humanWin(tile,false));
    return;
  }

  if(cP){
    // Find the matching tiles in hand
    const matching=pl.hand.filter(t=>same(t,tile)).slice(0,2);
    showMeldConfirm(tile,[...matching],'pung');
    return;
  }

  if(cC){
    // Find the chow tiles
    const{suit,num}=tile.value;
    const st=pl.hand.filter(t=>t.type==='suit'&&t.value.suit===suit);
    let ct=null;
    for(let s=Math.max(1,num-2);s<=Math.min(7,num);s++){
      const need=[s,s+1,s+2].filter(n=>n!==num);
      const found=need.map(n=>st.find(t=>t.value.num===n)).filter(Boolean);
      if(found.length===2){ct=found;break;}
    }
    if(ct) showMeldConfirm(tile,ct,'chow');
    return;
  }
}

// Show the meld tiles in the discard zone area for confirmation
function showMeldConfirm(claimedTile,handTiles,type){
  // Animate the claimed tile visually
  const pool=document.getElementById('discardPool');
  const lastTileEl=pool.lastElementChild;
  if(lastTileEl) lastTileEl.classList.add('claiming');

  setTimeout(()=>{
    // Build confirm UI in the actions area
    const acts=document.getElementById('playerActions');
    acts.innerHTML='';

    const wrap=document.createElement('div');
    wrap.className='meld-confirm';

    const lbl=document.createElement('div');
    lbl.className='meld-confirm-label';
    lbl.textContent=`Confirm ${type} — lay down:`;
    wrap.appendChild(lbl);

    // Show the meld tiles
    const tilesRow=document.createElement('div');
    tilesRow.className='meld-confirm-tiles';

    // Sort: claimed tile + hand tiles, sorted by num if chow
    const allTiles=[claimedTile,...handTiles];
    if(type==='chow') allTiles.sort((a,b)=>a.value.num-b.value.num);

    for(const t of allTiles){
      const el=mkTile(t,{});
      el.style.boxShadow=same(t,claimedTile)&&type!=='chow'?
        '0 0 10px rgba(212,168,67,0.8),2px 2px 0 var(--tile-shadow)':
        '2px 2px 0 var(--tile-shadow)';
      // Claimed tile gets gold highlight
      if(t.id===claimedTile.id) el.style.borderColor='var(--gold)';
      tilesRow.appendChild(el);
    }
    wrap.appendChild(tilesRow);

    // Confirm / cancel
    const btnRow=document.createElement('div');
    btnRow.className='meld-confirm-actions';

    const confirmBtn=document.createElement('button');
    confirmBtn.className='act-btn act-claim';
    confirmBtn.textContent='✓ Confirm';
    confirmBtn.onclick=()=>{
      humanClaim(type,claimedTile);
    };

    const cancelBtn=document.createElement('button');
    cancelBtn.className='act-btn act-pass';
    cancelBtn.textContent='✕ Cancel';
    cancelBtn.onclick=()=>{
      // Put it back — re-render normally
      renderAll();
      // Re-arm the timer for remaining time
      G.claimTimer=setTimeout(()=>{if(G.phase==='claim')aiClaims();},1500);
    };

    btnRow.appendChild(confirmBtn);
    btnRow.appendChild(cancelBtn);
    wrap.appendChild(btnRow);
    acts.appendChild(wrap);
  }, 350); // after animation
}

// Animate tile flying from discard pool toward hand

}

// ══════════════════════════════════════════
// AI — DIFFICULTY GATED
// ══════════════════════════════════════════

// EASY: plays its own hand with no awareness, random mistakes
// MEDIUM: shanten-based discard, basic discard pool awareness
// HARD: shanten + discard tracking + defensive play + concealment decisions

function aiPickDiscard(hand,diff,playerIdx){
  if(diff==='easy') return aiDiscardEasy(hand);
  if(diff==='medium') return aiDiscardMedium(hand);
  return aiDiscardHard(hand,playerIdx);
}

// Easy: old utility score + high randomness
function aiDiscardEasy(hand){
  const scored=hand.map(tile=>({
    tile,
    s: utilityBasic(tile,hand) + (Math.random()-.5)*6
  }));
  return scored.sort((a,b)=>a.s-b.s)[0].tile;
}

// Medium: shanten-based, checks if tile is dead in discard pool
function aiDiscardMedium(hand){
  let bestTile=null,bestShanten=999;
  for(const tile of hand){
    const rest=hand.filter(t=>t.id!==tile.id);
    let s=shanten(rest);
    // Prefer discarding tiles that are dead in the pool (safe)
    if(tileIsDead(tile)) s-=1;
    // Small randomness
    s+=(Math.random()-.5)*0.8;
    if(s<bestShanten){bestShanten=s;bestTile=tile;}
  }
  return bestTile||hand[0];
}

// Hard: shanten + discard awareness + defensive reads + concealment value
function aiDiscardHard(hand,playerIdx){
  let bestTile=null,bestScore=999;

  // Assess danger from each opponent
  const dangerKeys=getDangerKeys(playerIdx);

  for(const tile of hand){
    const rest=hand.filter(t=>t.id!==tile.id);
    let s=shanten(rest);

    // Dead tiles are safe to discard — actively prefer them
    if(tileIsDead(tile)) s-=2;

    // Dangerous tiles (opponents seem to want) — avoid discarding
    if(dangerKeys.has(tKey(tile))) s+=3;

    // Tiny randomness to avoid determinism
    s+=(Math.random()-.5)*0.3;

    if(s<bestScore){bestScore=s;bestTile=tile;}
  }
  return bestTile||hand[0];
}

// Build a set of tile keys that opponents appear to be collecting
function getDangerKeys(myIdx){
  const dangerous=new Set();
  for(let p=0;p<4;p++){
    if(p===myIdx)continue;
    const pl=G.players[p];
    // If player has 2+ melds showing, they're close — everything is dangerous
    if(pl.melds.length>=2){
      // Mark suit tiles they haven't discarded as potentially needed
      const theirDiscards=G.discards.filter(d=>d.by===p).map(d=>tKey(d.tile));
      for(const s of['B','C','CH']){
        const suitDiscarded=theirDiscards.filter(k=>k.startsWith(s)).length;
        if(suitDiscarded===0){
          // They haven't discarded this suit at all — probably building it
          for(let n=1;n<=9;n++)dangerous.add(`${s}${n}`);
        }
      }
    }
  }
  return dangerous;
}

// Basic utility (used by easy AI)
function utilityBasic(tile,hand){
  let s=0;
  const cnt=hand.filter(t=>same(t,tile)).length;
  if(cnt>=3)return 10;if(cnt===2)s+=4;
  if(tile.type==='suit'){
    const{suit,num}=tile.value;
    s+=hand.filter(t=>t.type==='suit'&&t.value.suit===suit&&Math.abs(t.value.num-num)<=2&&t.value.num!==num).length*2;
    if(num>=3&&num<=7)s+=1;
  }
  return s;
}

// Should AI claim this discard?
function aiWantsClaim(hand,tile,type,diff,playerIdx){
  // Easy: random chance, no strategy
  if(diff==='easy'){
    const thr=type==='pung'?.45:.25;
    if(type==='pung')return canPung(hand,tile)&&Math.random()<thr;
    if(type==='chow')return canChow(hand,tile)&&Math.random()<thr;
    return false;
  }

  // Medium: claim if it improves shanten, basic dead-tile check
  if(diff==='medium'){
    if(type==='pung'&&canPung(hand,tile)){
      if(tileIsDead(tile))return false; // tile is dead, skip
      const withMeld=hand.filter(t=>!same(t,tile)).slice(0,hand.length-2);
      const improvement=shanten(hand)-shanten(withMeld);
      return improvement>=0&&Math.random()<0.75;
    }
    if(type==='chow'&&canChow(hand,tile)){
      return Math.random()<0.5;
    }
    return false;
  }

  // Hard: claim only if shanten improves AND concealment not worth more
  if(type==='pung'&&canPung(hand,tile)){
    // Don't claim if already concealed and close to winning
    const currentShanten=shanten(hand);
    if(currentShanten<=1&&G.concealed[playerIdx])return false; // stay hidden, nearly there
    // Check improvement
    const matching=hand.filter(t=>same(t,tile)).slice(0,2);
    const afterClaim=hand.filter(t=>!matching.find(m=>m.id===t.id));
    const improvement=currentShanten-shanten(afterClaim);
    return improvement>0;
  }
  if(type==='chow'&&canChow(hand,tile)){
    // Hard AI rarely takes chows — they score less and reveal hand
    return shanten(hand)>=3&&Math.random()<0.3;
  }
  return false;
}

// STATE
// ══════════════════════════════════════════
let G={};

function newGame(practice,difficulty){
  G={
    wall:shuffle(buildDeck()),
    players:[
      {hand:[],melds:[],bonuses:[],seat:0},
      {hand:[],melds:[],bonuses:[],seat:1},
      {hand:[],melds:[],bonuses:[],seat:2},
      {hand:[],melds:[],bonuses:[],seat:3},
    ],
    discards:[],curP:0,roundWind:0,
    phase:'draw',practice,difficulty,
    pendingTile:null,
    lastDiscard:null,lastBy:-1,
    concealed:[true,true,true,true],
    over:false,claimTimer:null,
    totalScore:0,order:[],
  };
  for(let p=0;p<4;p++)for(let i=0;i<13;i++)dealTo(p);
  G.order=G.players[0].hand.map(t=>t.id);
}

function dealTo(p){
  if(!G.wall.length)return false;
  const t=G.wall.pop();
  if(t.bonus){G.players[p].bonuses.push(t);return dealTo(p);}
  G.players[p].hand.push(t);
  if(p===0)G.order.push(t.id);
  return true;
}

// ══════════════════════════════════════════
// TILE ELEMENT
// ══════════════════════════════════════════
function mkTile(tile,opts={}){
  const el=document.createElement('div');
  const cls=['tile'];
  if(opts.small)cls.push('small');
  if(opts.dt)cls.push('dt');
  if(opts.melded)cls.push('melded');
  if(opts.ld)cls.push('ld');
  if(opts.reveal)cls.push('reveal');
  if(opts.ghost){cls.push('ghost-slot');el.className=cls.join(' ');return el;}
  if(opts.faceDown){cls.push('face-down');el.className=cls.join(' ');return el;}
  el.className=cls.join(' ');
  const n=document.createElement('div');n.className='tile-num';n.textContent=getNum(tile);n.style.color=getColor(tile);
  const ic=document.createElement('div');ic.className='tile-icon';ic.innerHTML=getSVG(tile);
  el.appendChild(n);el.appendChild(ic);
  return el;
}

// ══════════════════════════════════════════
// DRAG STATE — unified pointer (mouse + touch)
// ══════════════════════════════════════════
const D={
  active:false,
  tileId:null,
  insertIdx:-1,
  overZone:false,
};

function orderedHand(){
  if(!G.players||!G.players[0])return[];
  const byId={};for(const t of G.players[0].hand)byId[t.id]=t;
  return G.order.filter(id=>byId[id]).map(id=>byId[id]);
}

// Extract x/y from either mouse or touch event
function evXY(e){
  if(e.touches&&e.touches.length)return{x:e.touches[0].clientX,y:e.touches[0].clientY};
  if(e.changedTouches&&e.changedTouches.length)return{x:e.changedTouches[0].clientX,y:e.changedTouches[0].clientY};
  return{x:e.clientX,y:e.clientY};
}

function bindDrag(el,tile){
  // Touch
  el.addEventListener('touchstart',e=>onDragStart(el,tile,e),{passive:false});
  // Mouse
  el.addEventListener('mousedown',e=>{if(e.button===0)onDragStart(el,tile,e);});
}

function onDragStart(el,tile,e){
  D.active=true;
  D.tileId=tile.id;
  const ordered=orderedHand();
  D.insertIdx=ordered.findIndex(t=>t.id===tile.id);
  D.overZone=false;

  const{x,y}=evXY(e);
  buildGhost(tile,x,y);
  el.classList.add('dragging');
  e.preventDefault();

  // Bind to document so events fire anywhere on screen
  document.addEventListener('touchmove',onDragMove,{passive:false});
  document.addEventListener('touchend',onDragEnd,{passive:false});
  document.addEventListener('touchcancel',onDragCancel,{passive:false});
  document.addEventListener('mousemove',onDragMove);
  document.addEventListener('mouseup',onDragEnd);
}

function onDragMove(e){
  if(!D.active)return;
  const{x,y}=evXY(e);

  // Move ghost
  const gh=document.getElementById('dragGhost');
  gh.style.left=(x-22)+'px';
  gh.style.top=(y-70)+'px';

  // Check discard zone
  const zone=document.getElementById('discardZone');
  if(!zone.classList.contains('hidden')){
    const zr=zone.getBoundingClientRect();
    D.overZone=x>=zr.left&&x<=zr.right&&y>=zr.top&&y<=zr.bottom;
    zone.classList.toggle('hot',D.overZone);
  } else {
    D.overZone=false;
  }

  // Find insert position
  const handDiv=document.getElementById('playerHand');
  const nonDragging=[...handDiv.querySelectorAll('.tile:not(.dragging):not(.ghost-slot)')];
  const ordered=orderedHand();
  const fromIdx=ordered.findIndex(t=>t.id===D.tileId);
  let newInsert=fromIdx;

  if(nonDragging.length>0){
    let placed=false;
    for(let i=0;i<nonDragging.length;i++){
      const r=nonDragging[i].getBoundingClientRect();
      if(x<r.left+r.width/2){
        const targetTile=nonDragging[i].__tileId;
        const targetIdx=ordered.findIndex(t=>t.id===targetTile);
        newInsert=targetIdx===-1?fromIdx:targetIdx;
        placed=true;break;
      }
    }
    if(!placed)newInsert=ordered.length-1;
  }

  if(newInsert!==D.insertIdx){D.insertIdx=newInsert;renderHandWhileDragging();}
  if(e.cancelable)e.preventDefault();
}

function onDragEnd(e){
  if(!D.active)return;
  dragCleanup();

  const zone=document.getElementById('discardZone');
  zone.classList.remove('hot');

  if(D.overZone&&G.phase==='discard'&&G.curP===0){
    const tile=G.players[0].hand.find(t=>t.id===D.tileId);
    D.active=false;D.tileId=null;
    if(tile)doDiscard(tile);
  } else {
    const fromIdx=G.order.indexOf(D.tileId);
    const toIdx=D.insertIdx;
    if(fromIdx!==-1&&toIdx!==-1&&fromIdx!==toIdx){
      G.order.splice(fromIdx,1);
      G.order.splice(toIdx>fromIdx?toIdx-1:toIdx,0,D.tileId);
    }
    D.active=false;D.tileId=null;
    renderPlayerHand();
  }
  if(e.cancelable)e.preventDefault();
}

function onDragCancel(){
  dragCleanup();
  D.active=false;D.tileId=null;
  document.getElementById('discardZone').classList.remove('hot');
  renderPlayerHand();
}

function dragCleanup(){
  document.removeEventListener('touchmove',onDragMove);
  document.removeEventListener('touchend',onDragEnd);
  document.removeEventListener('touchcancel',onDragCancel);
  document.removeEventListener('mousemove',onDragMove);
  document.removeEventListener('mouseup',onDragEnd);
  document.getElementById('dragGhost').style.display='none';
}

function buildGhost(tile,x,y){
  const gh=document.getElementById('dragGhost');
  gh.innerHTML='';
  const n=document.createElement('div');n.className='tile-num';n.textContent=getNum(tile);n.style.color=getColor(tile);
  const ic=document.createElement('div');ic.className='tile-icon';ic.innerHTML=getSVG(tile);
  gh.appendChild(n);gh.appendChild(ic);
  gh.style.display='flex';
  gh.style.left=(x-22)+'px';
  gh.style.top=(y-70)+'px';
}

function renderHandWhileDragging(){
  const handDiv=document.getElementById('playerHand');
  handDiv.innerHTML='';
  const ordered=orderedHand();
  const fromIdx=ordered.findIndex(t=>t.id===D.tileId);
  const toIdx=D.insertIdx;

  // Build display order with ghost slot
  // Strategy: remove dragged tile, insert ghost at toIdx
  const without=ordered.filter((_,i)=>i!==fromIdx);
  const insertAt=Math.max(0,Math.min(toIdx,without.length));
  const display=[];
  for(let i=0;i<without.length;i++){
    if(i===insertAt)display.push({ghost:true});
    display.push({tile:without[i],dragging:false});
  }
  if(insertAt>=without.length)display.push({ghost:true});
  // Also show dragging tile as faded in original slot? No — ghost slot is cleaner.
  // Add the dragged tile as dragging at its position
  display.splice(fromIdx<toIdx?fromIdx:fromIdx+1,0,{tile:ordered[fromIdx],dragging:true});

  for(const item of display){
    if(item.ghost){handDiv.appendChild(mkTile(null,{ghost:true}));continue;}
    const el=mkTile(item.tile,{});
    if(item.dragging)el.classList.add('dragging');
    el.__tileId=item.tile.id;
    if(!item.dragging)bindDrag(el,item.tile);
    handDiv.appendChild(el);
  }
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function renderAll(){renderAI();renderDiscards();renderPlayerHand();renderActions();updateTopBar();if(G.practice)renderHint();}

function renderAI(){
  const area=document.getElementById('aiArea');area.innerHTML='';
  for(let p=1;p<=3;p++){
    const pl=G.players[p];
    const row=document.createElement('div');row.className='ai-row';

    // Label: wind symbol + name initial + bonus
    const lbl=document.createElement('div');lbl.className='ai-label';
    lbl.textContent=WL[pl.seat]+' '+WN[pl.seat].slice(0,1)+(pl.bonuses.length?` 🌸${pl.bonuses.length}`:'');
    row.appendChild(lbl);

    if(G.practice){
      // Practice: show all tiles small
      const td=document.createElement('div');td.className='ai-tiles';
      for(const m of pl.melds){
        for(const t of m.tiles)td.appendChild(mkTile(t,{small:true,melded:true}));
        const s=document.createElement('div');s.style.width='2px';td.appendChild(s);
      }
      for(const t of pl.hand)td.appendChild(mkTile(t,{small:true,faceDown:false}));
      row.appendChild(td);
    } else {
      // Game mode: show tile count + melded sets only
      const cnt=document.createElement('div');cnt.className='ai-count';
      cnt.textContent=`${pl.hand.length} tiles`;
      row.appendChild(cnt);
      if(pl.melds.length){
        const md=document.createElement('div');md.className='ai-melds';
        for(const m of pl.melds){
          for(const t of m.tiles)md.appendChild(mkTile(t,{small:true,melded:true}));
          const s=document.createElement('div');s.style.width='2px';md.appendChild(s);
        }
        row.appendChild(md);
      }
    }
    area.appendChild(row);
  }
}

function renderDiscards(){
  const pool=document.getElementById('discardPool');pool.innerHTML='';
  const isHardClaim=G.difficulty==='hard'&&G.phase==='claim'&&G.lastDiscard&&G.curP===0;
  for(let i=0;i<G.discards.length;i++){
    const isLast=i===G.discards.length-1;
    const el=mkTile(G.discards[i].tile,{dt:true,ld:isLast});
    if(isLast&&isHardClaim){
      // Check if player is eligible to claim
      const t=G.discards[i].tile;
      const pl=G.players[0];
      const eligible=canWin([...pl.hand,t])||canPung(pl.hand,t)||(G.lastBy===3&&canChow(pl.hand,t));
      if(eligible){
        el.classList.add('claimable');
        el.onclick=()=>hardModeTileClaim(t);
        el.title='Click to claim';
      }
    }
    pool.appendChild(el);
  }
  if(G.discards.length)pool.scrollTop=pool.scrollHeight;
}

function renderPlayerHand(){
  if(D.active){renderHandWhileDragging();return;}
  const handDiv=document.getElementById('playerHand');handDiv.innerHTML='';
  for(const tile of orderedHand()){
    const el=mkTile(tile,{});
    el.__tileId=tile.id;
    bindDrag(el,tile);
    handDiv.appendChild(el);
  }
  // Melds + bonuses
  const md=document.getElementById('playerMelds');md.innerHTML='';
  for(const m of G.players[0].melds){
    for(const t of m.tiles)md.appendChild(mkTile(t,{small:true,melded:true}));
    const sp=document.createElement('span');sp.style.cssText='display:inline-block;width:3px;';md.appendChild(sp);
  }
  if(G.players[0].bonuses.length){
    const bl=document.createElement('span');bl.style.cssText='font-size:10px;color:var(--gold);align-self:center;';
    bl.textContent=G.players[0].bonuses.map(b=>b.value<4?'🌸':'🍂').join('');
    md.appendChild(bl);
  }
}

function renderActions(){
  const acts=document.getElementById('playerActions');acts.innerHTML='';
  if(G.over)return;
  const pl=G.players[0];

  if(G.phase==='claim'&&G.lastDiscard){
    const t=G.lastDiscard;
    const cW=canWin([...pl.hand,t]),cP=canPung(pl.hand,t),cC=G.lastBy===3&&canChow(pl.hand,t);
    if(G.difficulty==='hard'){
      // Hard mode: click the tile in the discard pool — just show Pass
      const eligible=cW||cP||cC;
      if(eligible){
        const hint=document.createElement('div');
        hint.style.cssText='font-size:11px;color:var(--gold);letter-spacing:0.1em;';
        hint.textContent='↑ Click the glowing tile to claim';
        acts.appendChild(hint);
      }
      addBtn(acts,'Pass','act-pass',()=>passClaim());
      return;
    }
    if(cW)addBtn(acts,'Mahjong! 🀄','act-mahjong',()=>humanWin(t,false));
    if(cP)addBtn(acts,'Pung','act-claim',()=>humanClaim('pung',t));
    if(cC)addBtn(acts,'Chow','act-claim',()=>humanClaim('chow',t));
    addBtn(acts,'Pass','act-pass',()=>passClaim());
    return;
  }
  if(G.curP===0){
    if(G.phase==='draw'){addBtn(acts,'Draw Tile','act-draw',()=>humanDraw());const h=document.createElement('div');h.style.cssText='font-size:10px;color:var(--dim);text-align:center;';h.textContent='Drag tiles to rearrange';acts.appendChild(h);}
    if(G.phase==='discard'){
      if(canWin(pl.hand))addBtn(acts,'Mahjong! 🀄','act-mahjong',()=>humanWin(null,true));
      const h=document.createElement('div');
      h.style.cssText='font-size:10px;color:var(--dim);text-align:center;';
      h.textContent='Drag any tile into the discard zone ↑';
      acts.appendChild(h);
    }
  }
}

function addBtn(c,label,cls,fn){const b=document.createElement('button');b.className=`act-btn ${cls}`;b.textContent=label;b.onclick=fn;c.appendChild(b);}

function updateTopBar(){
  document.getElementById('roundWind').textContent=WL[G.roundWind];
  document.getElementById('seatInfo').textContent=`Your seat: ${WN[G.players[0].seat]}`;
  document.getElementById('wallCount').textContent=`Wall: ${G.wall.length}`;
  document.getElementById('scoreDisp').textContent=`${G.totalScore} pts`;
}
function setSt(m){document.getElementById('status').textContent=m;}
function showZone(v){document.getElementById('discardZone').classList.toggle('hidden',!v);}

// ══════════════════════════════════════════
// HUMAN ACTIONS
// ══════════════════════════════════════════
function humanDraw(){
  if(G.curP!==0||G.phase!=='draw')return;
  if(!G.wall.length){endDraw();return;}
  // Pop tiles, handle bonus chain
  let t=G.wall.pop();
  while(t&&t.bonus){
    G.players[0].bonuses.push(t);
    updateTopBar();
    if(!G.wall.length){endDraw();return;}
    t=G.wall.pop();
  }
  G.pendingTile=t;
  // Show reveal overlay
  const wrap=document.getElementById('revealWrap');
  wrap.innerHTML='';
  // re-trigger animation
  wrap.style.animation='none';
  wrap.offsetHeight; // reflow
  wrap.style.animation='';
  const el=mkTile(t,{reveal:true});
  el.onclick=acceptDraw;
  wrap.appendChild(el);
  document.getElementById('drawReveal').classList.add('active');
  updateTopBar();
}

function acceptDraw(){
  if(!G.pendingTile)return;
  G.players[0].hand.push(G.pendingTile);
  G.order.push(G.pendingTile.id);
  G.pendingTile=null;
  document.getElementById('drawReveal').classList.remove('active');
  G.phase='discard';
  showZone(true);
  setSt('Drag a tile to discard zone — or tap Mahjong if you can win.');
  renderAll();
  if(canWin(G.players[0].hand))setSt('You can win! Tap Mahjong, or discard.');
}

function doDiscard(tile){
  if(G.curP!==0||G.phase!=='discard')return;
  G.players[0].hand=G.players[0].hand.filter(t=>t.id!==tile.id);
  G.order=G.order.filter(id=>id!==tile.id);
  G.discards.push({tile,by:0});
  G.lastDiscard=tile;G.lastBy=0;
  G.concealed[0]=false;G.phase='claim';
  showZone(false);
  setSt('You discarded. AI considering…');
  renderAll();
  setTimeout(aiClaims,700);
}

function humanClaim(type,tile){
  clearTimeout(G.claimTimer);
  const pl=G.players[0];
  if(type==='pung'){
    const m=pl.hand.filter(t=>same(t,tile)).slice(0,2);
    pl.melds.push({type:'pung',tiles:[tile,...m]});
    pl.hand=pl.hand.filter(t=>!m.find(x=>x.id===t.id));
    for(const x of m)G.order=G.order.filter(id=>id!==x.id);
    G.discards.pop();G.concealed[0]=false;
  } else {
    const{suit,num}=tile.value;
    const st=pl.hand.filter(t=>t.type==='suit'&&t.value.suit===suit);
    let ct=null;
    for(let s=Math.max(1,num-2);s<=Math.min(7,num);s++){
      const need=[s,s+1,s+2].filter(n=>n!==num);
      const found=need.map(n=>st.find(t=>t.value.num===n)).filter(Boolean);
      if(found.length===2){ct=found;break;}
    }
    if(ct){
      pl.melds.push({type:'chow',tiles:[tile,...ct]});
      pl.hand=pl.hand.filter(t=>!ct.find(x=>x.id===t.id));
      for(const x of ct)G.order=G.order.filter(id=>id!==x.id);
      G.discards.pop();G.concealed[0]=false;
    }
  }
  G.curP=0;G.phase='discard';G.lastDiscard=null;
  showZone(true);
  setSt('Claimed! Drag a tile to the discard zone.');
  renderAll();
}

function passClaim(){
  clearTimeout(G.claimTimer);
  G.curP=(G.lastBy+1)%4;
  if(G.curP===0){G.phase='draw';setSt('Your turn — tap Draw Tile.');showZone(false);renderAll();}
  else{G.phase='draw';setSt(`${WN[G.players[G.curP].seat]}'s turn…`);renderAll();setTimeout(()=>aiTurn(G.curP),800);}
}

function humanWin(dt,selfDraw){
  const pl=G.players[0];if(dt)pl.hand.push(dt);
  const pts=score(pl.hand,pl.bonuses,selfDraw,G.concealed[0]);
  G.totalScore+=pts;G.over=true;showZone(false);
  showWinModal(pts,selfDraw);
}

// ══════════════════════════════════════════
// AI
// ══════════════════════════════════════════
function aiClaims(){
  if(!G.lastDiscard)return;
  const t=G.lastDiscard;
  // Check wins first (any AI)
  for(let p=1;p<=3;p++){if(canWin([...G.players[p].hand,t])){aiWin(p,t);return;}}
  // Check pungs
  let claimed=false;
  for(let p=1;p<=3;p++){
    if(aiWantsClaim(G.players[p].hand,t,'pung',G.difficulty,p)){
      aiMeld(p,'pung',t);claimed=true;break;
    }
  }
  // Check chow — only player directly after discarder
  if(!claimed){
    const nextP=((G.lastBy+1)%4);
    if(nextP!==0&&aiWantsClaim(G.players[nextP].hand,t,'chow',G.difficulty,nextP)){
      aiMeld(nextP,'chow',t);claimed=true;
    }
  }
  if(!claimed){
    G.curP=(G.lastBy+1)%4;
    if(G.curP===0){G.phase='draw';setSt('Your turn — tap Draw Tile.');renderAll();}
    else{G.phase='draw';renderAll();setTimeout(()=>aiTurn(G.curP),600);}
  }
}

function aiTurn(p){
  if(G.over)return;G.curP=p;
  const pl=G.players[p];
  if(!dealTo(p)){endDraw();return;}
  setSt(`${WN[pl.seat]} is thinking…`);renderAll();
  if(canWin(pl.hand)){setTimeout(()=>aiWin(p,null),600);return;}
  // Hard AI thinks a little longer
  const thinkTime=G.difficulty==='hard'?1200+Math.random()*600:800+Math.random()*400;
  setTimeout(()=>{
    const d=aiPickDiscard(pl.hand,G.difficulty,p);
    pl.hand=pl.hand.filter(t=>t.id!==d.id);
    G.discards.push({tile:d,by:p});G.lastDiscard=d;G.lastBy=p;G.phase='claim';
    setSt(`${WN[pl.seat]} discarded — Claim?`);renderAll();
    G.claimTimer=G.practice?null:setTimeout(()=>{if(G.phase==="claim")aiClaims();},G.difficulty==="easy"?6000:G.difficulty==="medium"?4000:3500);
    renderActions();
  },thinkTime);
}

function aiMeld(p,type,tile){
  const pl=G.players[p];
  if(type==='pung'){
    const m=pl.hand.filter(t=>same(t,tile)).slice(0,2);
    pl.melds.push({type:'pung',tiles:[tile,...m]});
    pl.hand=pl.hand.filter(t=>!m.find(x=>x.id===t.id));
    G.discards.pop();G.concealed[p]=false;
  } else if(type==='chow'){
    const{suit,num}=tile.value;
    const st=pl.hand.filter(t=>t.type==='suit'&&t.value.suit===suit);
    let ct=null;
    for(let s=Math.max(1,num-2);s<=Math.min(7,num);s++){
      const need=[s,s+1,s+2].filter(n=>n!==num);
      const found=need.map(n=>st.find(t=>t.value.num===n)).filter(Boolean);
      if(found.length===2){ct=found;break;}
    }
    if(ct){
      pl.melds.push({type:'chow',tiles:[tile,...ct]});
      pl.hand=pl.hand.filter(t=>!ct.find(x=>x.id===t.id));
      G.discards.pop();G.concealed[p]=false;
    }
  }
  G.curP=p;G.phase='discard';setSt(`${WN[pl.seat]} claimed a ${type==='pung'?'Pung':'Chow'}!`);renderAll();
  setTimeout(()=>{
    const d=aiPickDiscard(pl.hand,G.difficulty,p);
    pl.hand=pl.hand.filter(t=>t.id!==d.id);
    G.discards.push({tile:d,by:p});G.lastDiscard=d;G.lastBy=p;G.phase='claim';
    setSt(`${WN[pl.seat]} discarded — Claim?`);renderAll();
    G.claimTimer=G.practice?null:setTimeout(()=>{if(G.phase==="claim")aiClaims();},G.difficulty==="easy"?6000:G.difficulty==="medium"?4000:3500);
    renderActions();
  },900);
}

function aiWin(p,dt){
  const pl=G.players[p];if(dt)pl.hand.push(dt);
  const self=!dt,pts=score(pl.hand,pl.bonuses,self,G.concealed[p]);
  G.over=true;showZone(false);
  const loss=self?-pts:(G.lastBy===0?-pts:-Math.floor(pts/2));
  G.totalScore+=loss;showLoseModal(p,pts,loss,self);
}

// ══════════════════════════════════════════
// MODALS
// ══════════════════════════════════════════
function endDraw(){
  G.over=true;showZone(false);
  showResult('draw','Wall Empty — Draw',
    [['Result','No winner this round']],
    []
  );
}
function showWinModal(pts,selfDraw){
  showResult('win','麻將! You Win! 🀄',[
    ['Hand value', pts+' pts', 'positive'],
    ['Win type', selfDraw?'Self-draw':'Discard claim'],
    ['Concealed', G.concealed[0]?'Yes ✓':'No'],
    ['Total score', G.totalScore+' pts', 'positive'],
  ],[]);
}
function showLoseModal(winner,pts,loss,selfDraw){
  const pl=G.players[winner];
  showResult('lose',WN[pl.seat]+' Wins',[
    [WN[pl.seat]+' hand', pts+' pts'],
    ['Win type', selfDraw?'Self-draw':'Off your discard'],
    ['Your change', loss+' pts', 'negative'],
    ['Total score', G.totalScore+' pts', G.totalScore>=0?'positive':'negative'],
  ],[]);
}
function showResult(type,title,rows,_){
  const panel=document.getElementById('resultPanel');
  const titleEl=document.getElementById('resultTitle');
  const rowsEl=document.getElementById('resultRows');
  const btnsEl=document.getElementById('resultBtns');

  titleEl.textContent=title;
  titleEl.className='result-title '+type;

  rowsEl.innerHTML='';
  for(const [label,val,valClass] of rows){
    const row=document.createElement('div');row.className='result-row';
    const l=document.createElement('span');l.textContent=label;
    const v=document.createElement('span');v.className='result-val'+(valClass?' '+valClass:'');v.textContent=val;
    row.appendChild(l);row.appendChild(v);
    rowsEl.appendChild(row);
  }

  btnsEl.innerHTML='';
  const nextBtn=document.createElement('button');
  nextBtn.className='btn btn-primary';
  nextBtn.textContent='Next Round';
  nextBtn.onclick=()=>{hideResult();startGame(G.practice);};
  const menuBtn=document.createElement('button');
  menuBtn.className='btn btn-ghost';
  menuBtn.textContent='Menu';
  menuBtn.onclick=()=>{hideResult();showMenu();};
  btnsEl.appendChild(nextBtn);btnsEl.appendChild(menuBtn);

  // Small delay so the table render happens first, then panel slides up
  setTimeout(()=>panel.classList.add('visible'),80);
}
function hideResult(){
  document.getElementById('resultPanel').classList.remove('visible');
}
function modal(title,body,btns,closeable=false){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=body;
  const bc=document.getElementById('modalBtns');bc.innerHTML='';
  for(const b of btns){const el=document.createElement('button');el.className=`btn ${b.c}`;el.textContent=b.l;el.onclick=b.f;bc.appendChild(el);}
  const closeBtn=document.getElementById('modalClose');
  closeBtn.style.display=closeable?'block':'none';
  closeBtn.onclick=closeable?hideModal:null;
  document.getElementById('modalOverlay').classList.add('active');
}
function hideModal(){document.getElementById('modalOverlay').classList.remove('active');}

// HINTS
// ══════════════════════════════════════════
function renderHint(){
  const pl=G.players[0];let h='';
  if(G.phase==='draw'){
    const s=shanten(pl.hand);
    h=s===-1?'You can win! Draw and declare Mahjong.':
      s===0?'One tile from Mahjong — tap Draw!':
      `${s+1} tiles from Mahjong. Tap Draw Tile.`;
  } else if(G.phase==='discard'){
    if(canWin(pl.hand)){h='🀄 You can win! Tap Mahjong!';}
    else{
      let bestTile=null,bestS=999;
      for(const t of pl.hand){
        const rest=pl.hand.filter(x=>x.id!==t.id);
        const s=shanten(rest)-(tileIsDead(t)?0.5:0);
        if(s<bestS){bestS=s;bestTile=t;}
      }
      const currentS=shanten(pl.hand);
      h=bestTile?`Best discard: ${tKey(bestTile)} · ${currentS} tile${currentS!==1?'s':''} from Mahjong`:'Drag a tile to the discard zone.';
    }
  } else if(G.phase==='claim'&&G.lastDiscard){
    const t=G.lastDiscard,hs=[];
    if(canWin([...pl.hand,t]))hs.push('🀄 You can WIN on this tile!');
    if(canPung(pl.hand,t)){
      const dead=tileIsDead(t);
      hs.push(`Pung available${dead?' (tile is scarce — consider passing)':''}`);
    }
    if(canChow(pl.hand,t))hs.push('Chow available');
    if(!hs.length)hs.push("Pass — this tile doesn't help.");
    h=hs.join(' · ');
  }
  document.getElementById('hintText').textContent=h;
}
function toggleHint(){document.getElementById('hintPanel').classList.toggle('visible');}

// NAV
// ══════════════════════════════════════════
let currentDiff='medium';
function setDiff(d){
  currentDiff=d;
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  document.querySelector(`.pill[onclick="setDiff('${d}')"]`).classList.add('active');
}

function startGame(practice){
  hideModal();
  newGame(practice,currentDiff);
  document.getElementById('menu').classList.remove('active');
  document.getElementById('game').classList.add('active');
  document.getElementById('hintBtn').style.display=practice?'block':'none';
  if(practice)document.getElementById('hintPanel').classList.add('visible');
  else document.getElementById('hintPanel').classList.remove('visible');
  showZone(false);
  hideResult();
  G.phase='draw';G.curP=0;
  setSt('Your turn — tap Draw Tile.');
  renderAll();
}

function showMenu(){
  clearTimeout(G.claimTimer);
  dragCleanup();D.active=false;D.tileId=null;
  document.getElementById('drawReveal').classList.remove('active');
  document.getElementById('discardZone').classList.remove('hot');
  document.getElementById('resultPanel').classList.remove('visible');
  document.getElementById('game').classList.remove('active');
  document.getElementById('menu').classList.add('active');
  hideModal();
}
